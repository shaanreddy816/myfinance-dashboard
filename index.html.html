// ═══════════════════════════════════════════════════════════
// SUPABASE CONFIG
// Step 1: Go to supabase.com/dashboard → your project
// Step 2: Settings → API → copy URL and anon key below
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL  = "https://ffvvavyhepnxdkvurzqn.supabase.co";       // e.g. https://xyzxyz.supabase.co
const SUPABASE_ANON = "sb_publishable_4AwUBcWY4fOnnJuX43v_EQ_zU-WWibr";  // starts with eyJh...
const USE_SUPABASE  = SUPABASE_URL !== "PASTE_YOUR_SUPABASE_URL";

// ─── Supabase REST helpers (no npm needed — pure fetch) ───
const sbUrl  = (path) => `${SUPABASE_URL}/rest/v1${path}`;
const sbAuth = (path) => `${SUPABASE_URL}/auth/v1${path}`;

const sbHeaders = (token) => {
  const h = { "Content-Type": "application/json", "apikey": SUPABASE_ANON };
  if (token) h["Authorization"] = "Bearer " + token;
  else h["Authorization"] = "Bearer " + SUPABASE_ANON;
  return h;
};

// Token management
const getToken    = ()  => { try { return JSON.parse(localStorage.getItem("sb_session")||"{}").access_token||""; } catch(e){return "";} };
const getRefToken = ()  => { try { return JSON.parse(localStorage.getItem("sb_session")||"{}").refresh_token||""; } catch(e){return "";} };
const saveSession = (s) => localStorage.setItem("sb_session", JSON.stringify(s));
const clearSess   = ()  => localStorage.removeItem("sb_session");

// Check if token is expired (JWT exp claim)
const isTokenExpired = (token) => {
  try {
    const payload = JSON.parse(atob(token.split(".")[1]));
    return payload.exp * 1000 < Date.now() + 60000; // 60s buffer
  } catch(e) { return true; }
};

// Auto-refresh token if expired
const getValidToken = async () => {
  const tok = getToken();
  if (!tok) return null;
  if (!isTokenExpired(tok)) return tok;
  // Refresh
  try {
    const res = await fetch(sbAuth("/token?grant_type=refresh_token"), {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
      body: JSON.stringify({ refresh_token: getRefToken() })
    });
    const data = await res.json();
    if (data.access_token) { saveSession(data); return data.access_token; }
  } catch(e) {}
  clearSess();
  return null;
};

// ─── Auth: Register ───────────────────────────────────────
const sbRegister = async (email, password, displayName) => {
  const res = await fetch(sbAuth("/signup"), {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
    body: JSON.stringify({ email, password, data: { display_name: displayName } })
  });
  const data = await res.json();
  if (data.error || data.msg) throw new Error(data.error?.message || data.msg || "Registration failed");
  if (data.session) saveSession(data.session);
  return data;
};

// ─── Auth: Login ──────────────────────────────────────────
const sbLogin = async (email, password) => {
  const res = await fetch(sbAuth("/token?grant_type=password"), {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (data.error || data.error_description) throw new Error(data.error_description || data.error || "Login failed");
  saveSession(data);
  return data;
};

// ─── Auth: Logout ─────────────────────────────────────────
const sbLogout = async () => {
  const tok = getToken();
  if (tok) {
    try {
      await fetch(sbAuth("/logout"), {
        method: "POST",
        headers: sbHeaders(tok)
      });
    } catch(e) {}
  }
  clearSess();
};

// ─── Data: Load ───────────────────────────────────────────
const sbLoadData = async () => {
  const tok = await getValidToken();
  if (!tok) return null;
  const res = await fetch(sbUrl("/finance_data?select=data&limit=1"), {
    headers: { ...sbHeaders(tok), "Prefer": "return=representation" }
  });
  const rows = await res.json();
  if (Array.isArray(rows) && rows.length > 0 && rows[0].data) {
    return JSON.parse(rows[0].data);
  }
  return null;
};

// ─── Data: Save (upsert) ──────────────────────────────────
let saveTimer = null;
const sbSaveData = async (d) => {
  const tok = await getValidToken();
  if (!tok) return;
  const userRes = await fetch(sbAuth("/user"), { headers: sbHeaders(tok) });
  const user = await userRes.json();
  if (!user.id) return;
  await fetch(sbUrl("/finance_data"), {
    method: "POST",
    headers: { ...sbHeaders(tok), "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify({ user_id: user.id, data: JSON.stringify(d), updated_at: new Date().toISOString() })
  });
};

// Debounced save — waits 2s after last change before saving to Supabase
const debouncedSave = (d) => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => sbSaveData(d).catch(() => {}), 2000);
};

// ─── EmailJS Reminders ────────────────────────────────────
const EMAILJS_SERVICE  = "PASTE_YOUR_EMAILJS_SERVICE_ID";   // e.g. service_abc123
const EMAILJS_TEMPLATE = "PASTE_YOUR_EMAILJS_TEMPLATE_ID";  // e.g. template_xyz456
const EMAILJS_PUBLIC   = "PASTE_YOUR_EMAILJS_PUBLIC_KEY";   // e.g. user_abc123
const USE_EMAILJS      = EMAILJS_SERVICE !== "PASTE_YOUR_EMAILJS_SERVICE_ID";

const sendReminder = async (to_email, subject, message) => {
  if (!USE_EMAILJS) { alert("EmailJS not configured yet.\n\nPaste your keys in the HTML."); return; }
  const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      service_id: EMAILJS_SERVICE,
      template_id: EMAILJS_TEMPLATE,
      user_id: EMAILJS_PUBLIC,
      template_params: { to_email, subject, message }
    })
  });
  return res.status === 200;
};


// ═══════════════════════════════════════════════
// AUTH SYSTEM
// ═══════════════════════════════════════════════
// Simple hash using Web Crypto (async SHA-256)
const hashPwd = async (pwd) => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
};

const AUTH_KEY = 'mfdb_users_v1';
const getUsers = () => { try { return JSON.parse(localStorage.getItem(AUTH_KEY)||'{}'); } catch(e){return {};} };
const saveUsers = u => localStorage.setItem(AUTH_KEY, JSON.stringify(u));
const userDataKey = u => `mfdb_data_${u}_v1`;
const apiKeyStore = u => `mfdb_apikey_${u}`;

function AuthGate({children}){
  const [screen,setScreen] = useState('login'); // login | register | forgot
  const [user,setUser]       = useState(()=>{ try{return localStorage.getItem('mfdb_session')||'';}catch(e){return '';} });
  const [displayName,setDisplayName] = useState(()=>{ try{ const u=localStorage.getItem('mfdb_session')||''; return localStorage.getItem('mfdb_display_'+u)||u; }catch(e){return '';} });
  const [form,setForm]   = useState({username:'',password:'',confirm:'',display:''});
  const [err,setErr]     = useState('');
  const [ok,setOk]       = useState('');
  const [busy,setBusy]   = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  // Auto-login if session exists and user record exists
  useEffect(()=>{
    if(user){ const users=getUsers(); if(!users[user]) { localStorage.removeItem('mfdb_session'); setUser(''); } }
  },[]);

  const doRegister = async () => {
    setErr(''); setBusy(true);
    const {username,password,confirm,display} = form;
    // Basic validation
    if(!display.trim()){ setErr('Please enter your full name.'); setBusy(false); return; }
    if(!username.trim()){ setErr('Please enter your email address.'); setBusy(false); return; }
    if(!username.trim().includes('@')){ setErr('Please enter a valid email address (e.g. name@gmail.com).'); setBusy(false); return; }
    if(password.length<6){ setErr('Password must be at least 6 characters.'); setBusy(false); return; }
    if(password!==confirm){ setErr('Passwords do not match.'); setBusy(false); return; }
    try {
      const email = username.trim().toLowerCase();
      const result = await sbRegister(email, password, display.trim());
      const uname = email.split('@')[0];
      const dname = display.trim();
      localStorage.setItem('mfdb_session', uname);
      localStorage.setItem('mfdb_display_'+uname, dname);
      setUser(uname);
      setDisplayName(dname);
    } catch(e){
      setErr(e.message||'Registration failed. Try again.');
    }
    setBusy(false);
  };

  const doLogin = async () => {
    setErr(''); setBusy(true);
    const {username,password} = form;
    if(!username.trim()){ setErr('Please enter your email address.'); setBusy(false); return; }
    if(!username.trim().includes('@')){ setErr('Please enter a valid email address (e.g. name@gmail.com).'); setBusy(false); return; }

    try {
      const email = username.trim().toLowerCase();
      const result = await sbLogin(email, password);
      const uname = email.split('@')[0];
      const dname = result.user?.user_metadata?.display_name || uname;
      localStorage.setItem('mfdb_session', uname);
      localStorage.setItem('mfdb_display_'+uname, dname);
      setUser(uname);
      setDisplayName(dname);
    } catch(e){
      setErr(e.message||'Login failed. Check your email and password.');
    }
    setBusy(false);
  };

  const doLogout = async () => {
    if(USE_SUPABASE) await sbLogout().catch(()=>{});
    localStorage.removeItem('mfdb_session');
    setUser(''); setDisplayName(''); setForm({username:'',password:'',confirm:'',display:''}); setErr(''); setOk('');

    return children({username:user, displayName:displayName||user, onLogout:doLogout});

  return(
    <div style={{minHeight:'100vh',background:'#020817',display:'flex',alignItems:'center',justifyContent:'center',padding:16,fontFamily:"'DM Sans',sans-serif"}}>
      {/* Background pattern */}

          {/* Tab switcher */}
          <div style={{display:'flex',gap:4,marginBottom:22,background:'#1e293b',borderRadius:9,padding:4}}>
            {[['login','🔑 Sign In'],['register','✨ Create Account']].map(([s,l])=>(
              <button key={s} onClick={()=>{setScreen(s);setErr('');setOk('');}} style={{flex:1,padding:'7px 0',borderRadius:7,cursor:'pointer',fontSize:12,fontWeight:700,background:screen===s?'linear-gradient(135deg,#6366f1,#7c3aed)':'transparent',color:screen===s?'white':'#64748b',border:'none',fontFamily:"'DM Sans',sans-serif"}}>{l}</button>
            ))}
          </div>

          {screen==='login' && (<>
            <div style={{color:'#94a3b8',fontSize:11,marginBottom:14}}>{USE_SUPABASE ? "Welcome back! Sign in with your email." : "Local mode — enter username to continue."}</div>
            <input style={inp} placeholder={USE_SUPABASE ? "Email address" : "Username"} value={form.username} onChange={e=>set('username',e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
            <input style={inp} type="password" placeholder="Password" value={form.password} onChange={e=>set('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()}/>
            {err&&<div style={{color:'#f87171',fontSize:11,marginBottom:10,padding:'7px 10px',background:'rgba(239,68,68,0.08)',borderRadius:6}}>⚠️ {err}</div>}
            <button style={btn} onClick={doLogin}>{busy?'Signing in...':'Sign In →'}</button>

          {screen==='register' && (<>
            <div style={{color:'#94a3b8',fontSize:11,marginBottom:14}}>{USE_SUPABASE ? "Create your account — data synced across all devices." : "Local mode account."}</div>

            <input style={inp} placeholder={USE_SUPABASE ? "Email address" : "Username (letters/numbers)"} value={form.username} onChange={e=>set('username',e.target.value)}/>
            <input style={inp} type="password" placeholder="Password (min 6 chars)" value={form.password} onChange={e=>set('password',e.target.value)}/>
            <input style={inp} type="password" placeholder="Confirm password" value={form.confirm} onChange={e=>set('confirm',e.target.value)} onKeyDown={e=>e.key==='Enter'&&doRegister()}/>
            {err&&<div style={{color:'#f87171',fontSize:11,marginBottom:10,padding:'7px 10px',background:'rgba(239,68,68,0.08)',borderRadius:6}}>⚠️ {err}</div>}
            {ok&&<div style={{color:'#10b981',fontSize:11,marginBottom:10,padding:'7px 10px',background:'rgba(16,185,129,0.08)',borderRadius:6}}>✅ {ok}</div>}
            <button style={btn} onClick={doRegister}>{busy?'Creating account...':'Create Account →'}</button>
          </>)}

          <div style={{marginTop:16,padding:'10px 12px',background:'rgba(99,102,241,0.06)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:8}}>
            <div style={{color:'#64748b',fontSize:10,lineHeight:1.6}}>🔒 <strong style={{color:'#94a3b8'}}>Privacy:</strong> Your data is stored locally in your browser. Each user gets a completely separate dashboard. Passwords are hashed with SHA-256.</div>
          </div>
        </div>

        <div style={{textAlign:'center',marginTop:16,color:'#334155',fontSize:11}}>MyFinance · Built with 💜 · Your data, your device</div>
      </div>
    </div>
  );
}

function Counter({value,dur=1300}){
  const [n,setN]=useState(0);
  useEffect(()=>{
    let raf; const s=performance.now();
    const tick=ts=>{const p=Math.min((ts-s)/dur,1),e=1-Math.pow(1-p,3);setN(Math.round(value*e));if(p<1)raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[value]);
  return React.createElement("span",null,fmt(n));
}

function Donut({items,size=120}){
  const total=items.reduce((s,e)=>s+(e.v||0),0);
  if(!total) return <div style={{width:size,height:size,background:"#1e293b",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#475569",fontSize:10}}>No data</span></div>;
  let off=0; const R=40,cx=60,cy=60,C=2*Math.PI*R;
  const slices=items.filter(e=>e.v>0).map(e=>{
    const p=e.v/total,dash=p*C,gap=C-dash,o=off*C; off+=p;
    return{...e,dash,gap,offset:o};
  });
  return(
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx={cx} cy={cy} r={R} fill="none" stroke="#1e293b" strokeWidth="18"/>
      {slices.map((s,i)=><circle key={i} cx={cx} cy={cy} r={R} fill="none" stroke={s.c} strokeWidth="18" strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.offset} transform={`rotate(-90 ${cx} ${cy})`}/>)}
      <text x={cx} y={cy-5} textAnchor="middle" fill="#64748b" fontSize="7" fontFamily="DM Sans">Total</text>
      <text x={cx} y={cy+7} textAnchor="middle" fill="white" fontSize="8" fontWeight="700" fontFamily="DM Sans">{fmt(total)}</text>
    </svg>
  );
}

    ];
    const TOTAL_SIP=FUNDS.reduce((s,f)=>s+f.sip,0);
    const TOTAL_CORPUS=FUNDS.reduce((s,f)=>s+f.currentCorpus,0);
    const STEP_UP=0.15; const YEARS=20;

    // Monthly SIP corpus with yearly step-up — proper algorithm
    const calcCorpus=(initSIP,annualRate,years,startCorpus=0)=>{
      const mr=annualRate/100/12;
      let corpus=startCorpus,invested=startCorpus,sip=initSIP;
      for(let y=0;y<years;y++){
        for(let m=0;m<12;m++){corpus=corpus*(1+mr)+sip;invested+=sip;}
        sip=Math.round(sip*(1+STEP_UP));
      }
      return{corpus:Math.round(corpus),invested:Math.round(invested)};
    };
    const calcFlat=(initSIP,annualRate,years,startCorpus=0)=>{
      const mr=annualRate/100/12;
      let corpus=startCorpus,invested=startCorpus;
      for(let y=0;y<years;y++){for(let m=0;m<12;m++){corpus=corpus*(1+mr)+initSIP;invested+=initSIP;}}
      return{corpus:Math.round(corpus),invested:Math.round(invested)};
    };

    const fundProj=FUNDS.map(f=>({...f,low:calcCorpus(f.sip,f.retLow,YEARS,f.currentCorpus),mid:calcCorpus(f.sip,f.retMid,YEARS,f.currentCorpus),high:calcCorpus(f.sip,f.retHigh,YEARS,f.currentCorpus)}));

    const portHigh={corpus:fundProj.reduce((s,f)=>s+f.high.corpus,0),invested:fundProj.reduce((s,f)=>s+f.high.invested,0)};
    const flatMid=calcFlat(TOTAL_SIP,14,YEARS,TOTAL_CORPUS);
    const stepUpExtra=portMid.corpus-flatMid.corpus;
    const finalYearSIP=Math.round(TOTAL_SIP*Math.pow(1.15,19));

    // Year-by-year journey at blended ~14% rate
    const journey=[];
    for(let yr=1;yr<=YEARS;yr++){const r=calcCorpus(TOTAL_SIP,14,yr,TOTAL_CORPUS);journey.push({yr,corpus:r.corpus,invested:r.invested,gain:Math.round((r.corpus-r.invested)/r.invested*100)});}

    const [selFund,setSelFund]=useState(null);
    const [scenario,setScenario]=useState("mid");
    const scData={low:portLow,mid:portMid,high:portHigh};
    const scLabel={low:"Conservative",mid:"Realistic ★",high:"Optimistic"};
    const scColor={low:"#f87171",mid:"#10b981",high:"#fbbf24"};
    const scRate={low:"~13% CAGR",mid:"~14-15% CAGR",high:"~18-20% CAGR"};

    // SVG sparkline
    const maxC=Math.max(...journey.map(y=>y.corpus));
    const W=280,H=55;
    const pts=journey.map((y,i)=>`${(i/(YEARS-1))*W},${H-(y.corpus/maxC*H)}`).join(" ");
    const ptsF=`0,${H} ${pts} ${W},${H}`;

    return(<>
      {/* Hero */}
      <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.12),rgba(167,139,250,0.05))",border:"1px solid rgba(99,102,241,0.22)",borderRadius:13,padding:"18px 22px",marginBottom:13}}>

    const groups=[
      {freq:"Monthly",c:"#10b981",items:[{day:"5th",l:"ICICI EMI",a:ff(D.icici.emi),email:false},{day:"15th",l:"SBI EMI",a:ff(D.sbi.emi),email:false},{day:"SIP date",l:"Monthly SIP",a:ff(sipAmt),email:false}]},
      {freq:"Yearly",c:"#f59e0b",items:[{day:"Jan",l:"Internet Bill",a:"₹8,000",email:true},{day:"Jan",l:"JIO / Sun Direct",a:"₹6,000",email:true},{day:"Mar",l:"Car Insurance",a:"₹16,000",email:true},{day:"15-May",l:"3Cr Term Insurance",a:"₹2,52,057",email:true},{day:"17-Feb",l:"2Cr Term Insurance",a:"₹1,80,110",email:true}]},
      {freq:"Quarterly (SCSS)",c:"#f59e0b",items:[{day:"Jan/Apr/Jul/Oct",l:"Dad SCSS Payout",a:ff(D.scss.dad.currentQtrPayout),email:false},{day:"Jan/Apr/Jul/Oct",l:"Mom SCSS Payout",a:ff(D.scss.mom.currentQtrPayout),email:false}]},
      {freq:"Every 3 Years",c:"#06b6d4",items:[{day:"Feb 2027",l:"HDFC ERGO Health Ins",a:"₹69,354",email:true}]},
    ];
    return(
      <div style={g2}>
        <Card>
          <CT icon="🔔">All Payment Reminders</CT>
          <div style={{marginBottom:10,padding:"7px 10px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:7,display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:15}}>📧</span>
            <div><div style={{color:"#a78bfa",fontSize:9,fontWeight:700}}>Reminders sent to:</div><div style={{color:"white",fontSize:11,fontWeight:700}}></div></div>
          </div>
          {groups.map((group,gi)=>(
            <div key={gi} style={{marginBottom:12}}>
              <div style={{color:"#64748b",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:7,display:"flex",gap:6,alignItems:"center"}}>
                <div style={{width:4,height:4,borderRadius:"50%",background:group.c}}/>
                {group.freq}
              </div>
              {group.items.map((r,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,padding:"6px 9px",background:"#1e293b",borderRadius:6}}>
                  <div style={{background:`${group.c}15`,border:`1px solid ${group.c}28`,borderRadius:4,padding:"2px 6px",minWidth:65,textAlign:"center"}}>
                    <div style={{color:group.c,fontSize:7,fontWeight:800,lineHeight:1.4}}>{r.day}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{color:"#e2e8f0",fontSize:10,fontWeight:600}}>{r.l}</div>
                    <div style={{color:"#64748b",fontSize:8}}>{r.a}</div>
                  </div>
                  {r.email&&<Badge label="📧 Email" color="#6366f1"/>}
                </div>
              ))}
            </div>
          ))}
        </Card>
        <Card>
          <CT icon="📆">Annual Financial Calendar</CT>
          {[["January","📶 Internet ₹8,000","📺 JIO/Sun Direct ₹6,000","💰 SCSS Qtr Payout ₹41,000"],["February","🛡 2Cr Term Ins ₹1,80,110 (if due)","🏥 Health Ins every 3 yrs ₹69,354"],["March","🚘 Car Insurance ₹16,000"],["April","💰 SCSS Qtr Payout ₹41,000","🏘 Rental income starts (Apr 2026)"],["May","🛡 3Cr Term Insurance ₹2,52,057"],["July","💰 SCSS Qtr Payout ₹41,000"],["October","💰 SCSS Qtr Payout ₹41,000"],["Every Month","🏦 SBI EMI ₹73,377 (15th)","🏦 ICICI EMI ₹42,556 (5th)","📈 MF SIPs ₹55,000/mo","🏦 Sweep FD ₹9,060 (once deposited)"]].map(([month,...events])=>(
            <div key={month} style={{marginBottom:8,padding:"7px 10px",background:"#1e293b",borderRadius:7}}>
              <div style={{color:"#fbbf24",fontSize:9,fontWeight:700,marginBottom:4}}>{month}</div>
              {events.map((e,i)=><div key={i} style={{color:"#94a3b8",fontSize:9,marginBottom:2}}>• {e}</div>)}
            </div>
          ))}
        </Card>
      </div>
    );
  }

  // ══ TAB: AI ════════════════════════════════
  function AITab(){
    return(
      <div style={{...g2,gridTemplateColumns:"1fr 1.4fr",alignItems:"start"}}>
        <div>
          <Card style={{marginBottom:10}}>
            <CT icon="⚡">Quick Questions</CT>
            {["What is my total current income?","When should I top up SCSS to ₹30L?","How much extra income after SCSS and FD top-up?","Should I prepay ICICI or top up SCSS first?","When will ICICI loan close at current EMI?","How much will rental income be in 5 years?","Am I over or under-insured?","Best use of ₹20L right now?"].map((q,i)=>(
              <button key={i} style={qb} onClick={()=>setInput(q)} onMouseEnter={e=>{e.target.style.background="#334155";e.target.style.color="white"}} onMouseLeave={e=>{e.target.style.background="#1e293b";e.target.style.color="#94a3b8"}}
              style={{...qb,marginBottom:5,width:"100%",textAlign:"left"}}>{q}</button>
            ))}
          </Card>
          <Card>
            <CT icon="🧠">What I Know</CT>
            {[["Salary","₹2,00,000/month"],["SCSS Dad","₹10L deposited, ₹20L to add"],["SCSS Mom","₹10L deposited, ₹20L to add"],["SCSS Payout Now","₹41,000/quarter combined"],["SCSS Payout Target","₹1,23,000/quarter combined"],["Sweep FD","₹15L planned, NOT deposited"],["Rental","₹1.15L/mo from Apr 2026"],["SBI","₹89.2L · 7.45% · 339mo left"],["ICICI","₹46.1L · 9.5% · 231mo left"],["SIP","₹55K/mo · 15% step-up"]].map(([k,v],i,arr)=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<arr.length-1?"1px solid #1e293b":"none"}}>
                <span style={{color:"#94a3b8",fontSize:9,fontWeight:600}}>{k}</span>
                <span style={{color:"#e2e8f0",fontSize:9,textAlign:"right",maxWidth:"55%"}}>{v}</span>
              </div>
            ))}
          </Card>
        </div>
        <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:13,display:"flex",flexDirection:"column",height:500}}>
          <div style={{padding:"9px 12px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:27,height:27,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
            <div><div style={{color:"white",fontSize:11,fontWeight:700}}>AI Financial Advisor</div><div style={{color:apiKey&&apiKey!=="demo"?"#10b981":"#f59e0b",fontSize:9}}>{apiKey&&apiKey!=="demo"?"● Online · Full knowledge":"● Demo mode"}</div></div>
            {(!apiKey||apiKey==="demo")&&<button onClick={()=>setShowModal(true)} style={{marginLeft:"auto",background:"linear-gradient(135deg,#6366f1,#7c3aed)",border:"none",borderRadius:7,padding:"4px 9px",color:"white",cursor:"pointer",fontSize:9,fontWeight:700,fontFamily:"DM Sans,sans-serif"}}>Add Key</button>}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:10,display:"flex",flexDirection:"column",gap:8}}>
            {msgs.length===0&&<div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"14px 14px 14px 4px",padding:"9px 12px",fontSize:11,lineHeight:1.7,color:"#cbd5e1"}} className="aib">{apiKey&&apiKey!=="demo"?"Hi Shantan! I know your SCSS status (₹10L+₹10L deposited, ₹20L more each to reach ₹30L target), Sweep FD not yet deposited, rental starting Apr 2026, loans, SIP, and all insurance. Ask anything!":"Add your API key to unlock personalised AI financial advice."}</div>}
            {msgs.map((m,i)=>(
              <div key={i} style={{...(m.role==="user"?{background:"linear-gradient(135deg,#6366f1,#7c3aed)",borderRadius:"14px 14px 4px 14px",alignSelf:"flex-end"}:{background:"#1e293b",border:"1px solid #334155",borderRadius:"14px 14px 14px 4px",alignSelf:"flex-start",color:"#cbd5e1"}),padding:"8px 12px",maxWidth:"78%",fontSize:11,lineHeight:1.7}} className="aib">{m.content}</div>
            ))}
            {loading&&<div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:"14px 14px 14px 4px",padding:"8px 12px",fontSize:11,color:"#64748b"}}>Analysing<span style={{animation:"pulse 1s infinite"}}>...</span></div>}
            <div ref={chatRef}/>
          </div>
          <div style={{padding:"7px 9px",borderTop:"1px solid #1e293b",display:"flex",gap:6,alignItems:"center"}}>
            <input style={{flex:1,background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"7px 11px",color:"white",fontSize:11,outline:"none",fontFamily:"DM Sans,sans-serif"}} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask anything about your finances..."/>
            <button onClick={send} style={{background:"linear-gradient(135deg,#6366f1,#7c3aed)",border:"none",borderRadius:7,padding:"7px 13px",color:"white",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"DM Sans,sans-serif",opacity:loading||!apiKey||apiKey==="demo"?0.5:1}}>{loading?"...":"Ask →"}</button>
          </div>
        </div>
      </div>
    );
  }

  // ── RENDER ─────────────────────────────────
  const TABS=[["overview","📊 Overview"],["income","💰 Income"],["schemes","🏛 Schemes (SCSS)"],["fd","🏦 FD"],["expenses","💸 Expenses"],["loans","🏠 Loans"],["mf","📈 Mutual Funds"],["ins1","🛡 3Cr Policy"],["ins2","🛡 2Cr Policy"],["health","🏥 Health Ins"],["reminders","🔔 Reminders"],["ai","🤖 AI Advisor"]];

  return(
    <div style={{minHeight:"100vh",background:"#020817",fontFamily:"'DM Sans',sans-serif",color:"white"}}>
      {showModal&&<APIModal onSave={saveKey}/>}

      {/* NAV */}
      <div style={{background:"rgba(2,8,23,0.96)",borderBottom:"1px solid #1e293b",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:50,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:27,height:27,borderRadius:6,background:"linear-gradient(135deg,#6366f1,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>💼</div>
          <div>
            <div style={{fontSize:12,fontWeight:800,background:"linear-gradient(135deg,#6366f1,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{displayName}&apos;s Finance Dashboard</div>
            <div style={{color:"#475569",fontSize:8}}>@{username}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{textAlign:"right"}}><div style={{color:"#64748b",fontSize:7}}>INCOME NOW</div><div style={{color:"#10b981",fontSize:11,fontWeight:800}}>{fmt(curInc)}/mo</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#64748b",fontSize:7}}>SURPLUS</div><div style={{color:"#34d399",fontSize:11,fontWeight:800}}>{fmt(surplus)}/mo</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#64748b",fontSize:7}}>EXPENSES</div><div style={{color:"#ef4444",fontSize:11,fontWeight:800}}>{fmt(mT)}/mo</div></div>
          <button onClick={()=>setEditMode(e=>!e)} style={{background:editMode?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(255,255,255,0.04)",border:editMode?"none":"1px solid #334155",borderRadius:7,padding:"4px 10px",color:"white",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"DM Sans,sans-serif"}}>
            {editMode?"💾 Done":"✏️ Edit"}
          </button>
          <button onClick={()=>{if(confirm("Sign out of "+displayName+"'s dashboard?")) onLogout();}} style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,padding:"4px 10px",color:"#f87171",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"DM Sans,sans-serif"}}>
            🚪 Logout
          </button>
        </div>
      </div>

      <div style={{maxWidth:1400,margin:"0 auto",padding:"14px 13px"}}>
        {editMode&&(
          <div style={{background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.22)",borderRadius:8,padding:"8px 13px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:14}}>✏️</span>
              <div>
                <div style={{color:"#fbbf24",fontSize:11,fontWeight:700}}>Edit Mode ON — click any yellow value to update. Changes auto-save to browser.</div>
                <div style={{color:"#78350f",fontSize:9}}>In FD tab: use Mark Deposited button when you deposit the ₹15L.</div>
              </div>
            </div>
            <button onClick={()=>{if(confirm("Reset all data to defaults?")) {localStorage.removeItem(userDataKey(username));setD(JSON.parse(JSON.stringify(DEF)));} }} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.22)",borderRadius:5,padding:"3px 8px",color:"#f87171",cursor:"pointer",fontSize:9,fontFamily:"DM Sans,sans-serif"}}>↺ Reset</button>
          </div>
        )}

        {/* AI Insight bar */}
        <div style={{background:"linear-gradient(135deg,rgba(99,102,241,0.09),rgba(167,139,250,0.04))",border:"1px solid rgba(99,102,241,0.16)",borderRadius:10,padding:"11px 13px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:16,flexShrink:0,marginTop:1}}>🤖</span>
          <div style={{flex:1}}>
            <div style={{color:"#a78bfa",fontSize:8,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:3}}>AI Financial Snapshot</div>
            {insightLoad?<div style={{color:"#475569",fontSize:10}}>Analysing your finances...</div>
              :insight?<div style={{color:"#cbd5e1",fontSize:10,lineHeight:1.7,whiteSpace:"pre-line"}}>{insight}</div>
              :<div style={{color:"#475569",fontSize:10}}>{apiKey&&apiKey!=="demo"?"Connecting...":"Add API key in AI Advisor tab for personalised insights."}</div>}
          </div>
          <button onClick={()=>setTab("ai")} style={{background:"rgba(99,102,241,0.12)",border:"1px solid rgba(99,102,241,0.24)",borderRadius:6,padding:"5px 10px",color:"#a78bfa",cursor:"pointer",fontSize:9,fontWeight:700,fontFamily:"DM Sans,sans-serif",flexShrink:0}}>Ask AI →</button>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:2,marginBottom:16,background:"#0f172a",borderRadius:9,padding:3,flexWrap:"wrap"}}>
          {TABS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"5px 11px",borderRadius:6,cursor:"pointer",fontSize:10,fontWeight:600,transition:"all 0.2s",background:tab===id?"linear-gradient(135deg,#6366f1,#7c3aed)":"transparent",color:tab===id?"white":"#64748b",border:"none",outline:"none",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}}>{lbl}</button>
          ))}
        </div>

        {tab==="overview"  && <Overview/>}
        {tab==="income"    && <IncomeTab/>}
        {tab==="schemes"   && <SchemesTab/>}
        {tab==="fd"        && <FDTab/>}
        {tab==="expenses"  && (
          <div style={{...g2,gridTemplateColumns:"1.5fr 1fr",alignItems:"start"}}>
            <ExpenseView D={D} editMode={editMode} updExp={updExp}/>
            <Card>
              <CT icon="📧">Email Reminders</CT>
              {["Internet — January","JIO/Sun Direct — January","Car Insurance — March","3Cr Term Ins — 15 May","2Cr Term Ins — 17 Feb","Health Ins — Feb 2027"].map((item,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"5px 8px",background:"#1e293b",borderRadius:6}}>
                  <span style={{color:"#10b981"}}>✓</span>
                  <span style={{color:"#e2e8f0",fontSize:10}}>{item}</span>
                  <div style={{marginLeft:"auto"}}><Badge label="📧 Set" color="#6366f1"/></div>
                </div>
              ))}
              <div style={{marginTop:8,padding:"7px 9px",background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:6}}>
                <span style={{color:"#a78bfa",fontSize:10}}>→ </span>
              </div>
            </Card>
          </div>
        )}
        {tab==="loans"     && <LoansTab/>}
        {tab==="mf"        && <MutualFundsTab/>}
        {tab==="ins1"      && <InsuranceTab pk="p1"/>}
        {tab==="ins2"      && <InsuranceTab pk="p2"/>}
        {tab==="health"    && <HealthTab/>}
        {tab==="reminders" && <RemindersTab/>}
        {tab==="ai"        && <AITab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AuthGate>
    {({username, displayName, onLogout}) => (
      <App username={username} displayName={displayName} onLogout={onLogout}/>
    )}
  </AuthGate>
);
</script>
</body>
</html>
