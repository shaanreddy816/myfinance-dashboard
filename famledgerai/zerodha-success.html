<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha Connected</title>
    <style>
        body { font-family: sans-serif; background: #0b0f1a; color: #e8edf5; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <h2>Connecting your Zerodha account...</h2>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('access_token');
        if (token) {
            localStorage.setItem('zerodha_access_token', token);
            // Redirect back to the Investments page
            window.location.href = '/?page=investments';
        } else {
            document.body.innerHTML = '<h2>Failed to connect Zerodha. Please try again.</h2>';
        }
    </script>
</body>
</html>
