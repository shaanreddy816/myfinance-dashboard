        .sidebar-profile { padding:0 12px 20px; border-bottom:1px solid #1e293b; margin-bottom:20px; }
        .profile-selector { width:100%; background:#1e293b; border:1px solid #334155; border-radius:8px; padding:8px 10px; color:white; font-size:13px; font-weight:500; outline:none; cursor:pointer; }

        .month-picker input { background:#1e293b; border:1px solid #334155; border-radius:8px; padding:8px 10px; color:white; font-size:13px; outline:none; }
        .sidebar-nav { flex:1; display:flex; flex-direction:column; gap:4px; }
        .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:8px; color:#94a3b8; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.2s; }
        .nav-item i { width:20px; font-size:16px; text-align:center; }
        .nav-item:hover { background:#1e293b; color:#e2e8f0; }
        .nav-item.active { background:linear-gradient(135deg,#6366f1,#7c3aed); color:white; box-shadow:0 4px 10px rgba(99,102,241,0.3); }
        .sidebar-footer { border-top:1px solid #1e293b; margin-top:20px; padding-top:16px; }
        .lang-selector select { width:100%; background:#1e293b; border:1px solid #334155; border-radius:8px; padding:8px 10px; color:white; font-size:13px; outline:none; cursor:pointer; margin-bottom:12px; }
        .theme-toggle { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:#1e293b; border-radius:8px; margin-bottom:12px; font-size:13px; color:#94a3b8; }
        .theme-toggle i { font-size:16px; }
        .logout-btn { display:flex; align-items:center; gap:12px; padding:10px 14px; color:#ef4444; font-size:14px; font-weight:500; cursor:pointer; border-radius:8px; transition:all 0.2s; }
        .logout-btn:hover { background:rgba(239,68,68,0.1); }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .page-title { font-size:24px; font-weight:700; background:linear-gradient(135deg,#6366f1,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .user-badge { display:flex; align-items:center; gap:12px; background:#1e293b; padding:8px 16px; border-radius:30px; }
        .user-avatar { width:32px; height:32px; background:#334155; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; color:white; }
        .user-email { font-size:13px; color:#94a3b8; }
        .snap-btn { background:#10b981; border:none; border-radius:8px; padding:7px 12px; color:white; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:4px; }
        .ebtn { background:linear-gradient(135deg,#f59e0b,#d97706); border:none; border-radius:8px; padding:7px 16px; color:white; font-size:12px; font-weight:700; cursor:pointer; }
        .lbtn { background:#1e293b; border:1px solid #334155; border-radius:8px; padding:7px 14px; color:#94a3b8; font-size:12px; cursor:pointer; }
        /* ===== PAGES ===== */
        .page { display:none; }
        .page.active-page { display:block; }
        .card { background:#0f172a; border:1px solid #1e293b; border-radius:16px; padding:20px; margin-bottom:20px; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
        .card-title { font-size:14px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:#64748b; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .card-title i { color:#6366f1; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
        .kpi-card { background:#1e293b; border-radius:12px; padding:20px; }
        .kpi-label { font-size:12px; color:#64748b; text-transform:uppercase; margin-bottom:8px; }
        .kpi-value { font-size:28px; font-weight:700; margin-bottom:4px; }
        .kpi-sub { font-size:12px; color:#475569; }
        .row-flex { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #1e293b; }
        .row-flex:last-child { border-bottom:none; }
        .yellow-input { background:#1e293b; border:1px solid #f59e0b; border-radius:6px; padding:6px 10px; color:#f59e0b; font-size:13px; font-weight:600; outline:none; width:100px; text-align:right; }
        .add-btn { background:rgba(99,102,241,0.1); border:1px dashed #6366f1; border-radius:8px; padding:10px; color:#6366f1; font-size:13px; font-weight:600; cursor:pointer; width:100%; text-align:center; margin-top:12px; }

        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background:#0f172a; border:1px solid #334155; border-radius:16px; padding:24px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }

        .review-item { display:flex; gap:8px; margin-bottom:12px; align-items:center; }

        .review-item select { width:120px; }
        .modal-buttons { display:flex; gap:12px; justify-content:flex-end; margin-top:20px; }
        .confirm-btn { background:#10b981; border:none; border-radius:6px; padding:8px 16px; color:white; font-weight:600; cursor:pointer; }
        .cancel-btn { background:#1e293b; border:1px solid #334155; border-radius:6px; padding:8px 16px; color:#94a3b8; font-weight:600; cursor:pointer; }
        .loading { border:3px solid #334155; border-top-color:#6366f1; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; }

</div>

        income:{husband:0,wife:0,husbandLabel:"Husband Salary / Income",wifeLabel:"Wife Salary / Income",rental:115000,rentalActive:false},
        scss:{dad:{deposited:1000000,target:3000000,rate:8.2}, mom:{deposited:1000000,target:3000000,rate:8.2}},
        fd:{planned:1500000,deposited:false,rate:9.0,actualMonthly:0},
        expenses:{
            monthly:[
                {id:"sbi", label:"SBI Loan EMI", v:73377, icon:"🏦"},
                {id:"icici", label:"ICICI Loan EMI", v:42556, icon:"🏦"},
                {id:"maint", label:"Apt Maintenance", v:2500, icon:"🏠"},
                {id:"maid", label:"Maid", v:10000, icon:"🧹"},
                {id:"groc", label:"Groceries", v:10000, icon:"🛒"},
                {id:"rest", label:"Restaurant", v:10000, icon:"🍽️"},
                {id:"elec", label:"Electricity", v:1000, icon:"⚡"},
                {id:"gas", label:"Gas Cylinder", v:2500, icon:"🔥"},
                {id:"petro", label:"Petrol", v:20000, icon:"🚗"},
                {id:"sip", label:"SIP Investment", v:55000, icon:"📈"},
                {id:"misc", label:"Miscellaneous", v:15000, icon:"💼"}
            ],
            periodic:[
                {id:"ins3", label:"3Cr Term Insurance", v:252057, icon:"🛡", due:"15-May each year", years:1},
                {id:"ins2", label:"2Cr Term Insurance", v:180110, icon:"🛡", due:"17-Feb each year", years:1},
                {id:"car", label:"Car Insurance", v:11500, icon:"🚘", due:"Annual (renew in Mar)", years:1},
                {id:"health", label:"Health Insurance (Me & Wife)", v:69354, icon:"❤️", due:"Feb 2029 (every 3yr)", years:3},
                {id:"parents", label:"Parents Health Insurance", v:368487, icon:"👴👵", due:"Feb 2029 (every 3yr)", years:3}
            ]
        },
        loans:{
            sbi:{name:"SBI Home Loan · Hyderabad", principal:9270000, rate:7.45, emi:73377, tenure:360, paid:22, outstanding:7993315, account:"42920946856", sanctioned:"29-04-2024", emiDate:"15th of month"},
            icici:{name:"ICICI Home Loan · Wanaparthy", principal:4728780, rate:8.25, emi:42556, tenure:212, paid:10, outstanding:4638966, account:"TBMBN00007400524", sanctioned:"26-03-2025", emiDate:"10th of month"}
        },
        sip:{monthly:55000, stepUp:15, rate:12, startYear:2026},
        ins:{
            p1:{coverage:30000000,
                schedule:[{yr:2025, date:"15-May-2025", amt:207569, paid:true},
                          {yr:2026, date:"15-May-2026", amt:252057, paid:false},
                          {yr:2027, date:"15-May-2027", amt:252057, paid:false},
                          {yr:2028, date:"15-May-2028", amt:252057, paid:false},
                          {yr:2029, date:"15-May-2029", amt:252057, paid:false}]},
            p2:{coverage:20000000,
                schedule:[{yr:2026, date:"17-Feb-2026", amt:141213, paid:true},
                          {yr:2027, date:"17-Feb-2027", amt:180110, paid:false},
                          {yr:2028, date:"17-Feb-2028", amt:180110, paid:false},
                          {yr:2029, date:"17-Feb-2029", amt:180110, paid:false},
                          {yr:2030, date:"17-Feb-2030", amt:180110, paid:false}]}
        },
        health:{coverage:2500000, premium:69354, nextDue:"Feb 2029"},
        children:{expenses:[
            {id:"edu", label:"Education Fees", v:0, icon:"📚"},
            {id:"sport", label:"Sports / Activities", v:0, icon:"⚽"},
            {id:"other", label:"Other Children Expense", v:0, icon:"🎒"}
        ]}
    }));

    let editMode = false;
    let currentProfile = 'Me';
    let currentMonth = '2026-02';
    let currentLang = 'en';

    // ========== HELPER FUNCTIONS ==========
    function ff(n) { return "₹" + (Number(n)||0).toLocaleString("en-IN"); }
    function fl(n) { n = Number(n)||0; if(n>=10000000) return "₹"+(n/10000000).toFixed(2)+"Cr"; if(n>=100000) return "₹"+(n/100000).toFixed(1)+"L"; return "₹"+n.toLocaleString("en-IN"); }
    function num(v) { let c=String(v).replace(/[₹,\s%]/g,""); return (c!==""&&!isNaN(c)) ? parseFloat(c) : 0; }
    function get(id) { return document.getElementById(id); }
    function html(id, h) { let el = get(id); if (el) el.innerHTML = h; }

    // ========== LANGUAGE CHANGE ==========
    function changeLanguage(lang) {
        currentLang = lang;
        // Update static elements with data-i18n
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (el.tagName === 'SPAN' || el.tagName === 'DIV') {
                el.innerText = t(key);
            } else if (el.tagName === 'LABEL') {
                el.innerText = t(key);
            } else {
                // For nav items, update the inner span
                const span = el.querySelector('span');
                if (span) span.innerText = t(key);
            }
        });
        // Re-render current page to update dynamic content
        renderCurrentPage();
    }

    // ========== NAVIGATION ==========
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function(e) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            this.classList.add('active');
            let page = this.dataset.page;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            get('page-'+page).classList.add('active-page');
            get('pageTitle').innerText = this.querySelector('span').innerText; // translated already
            renderCurrentPage();
        });
    });

    get('profileSelect').addEventListener('change', (e) => { currentProfile = e.target.value; renderCurrentPage(); });
    get('monthPicker').addEventListener('change', (e) => { currentMonth = e.target.value; renderCurrentPage(); });

    // ========== RENDER CURRENT PAGE ==========
    function renderCurrentPage() {
        let activePage = document.querySelector('.page.active-page')?.id;
        if (!activePage) return;
        let pageName = activePage.replace('page-', '');
        switch (pageName) {
            case 'overview': renderOverview(); break;
            case 'accounts': renderAccounts(); break;
            case 'insights': renderInsights(); break;
            case 'transactions': renderTransactions(); break;
            case 'plan': renderPlan(); break;
            case 'debt': renderDebt(); break;
            case 'goals': renderGoals(); break;
            case 'help': renderHelp(); break;
            case 'settings': renderSettings(); break;
        }
    }

    // ========== COMPUTED VALUES ==========
    function getScssMonthly() {
        let dadQtr = D.scss.dad.deposited * D.scss.dad.rate / 400;
        let momQtr = D.scss.mom.deposited * D.scss.mom.rate / 400;
        return Math.round((dadQtr + momQtr) / 3);
    }
    function getTotalIncome() {
        let scssMonthly = getScssMonthly();
        let fdMonthly = D.fd.deposited ? D.fd.actualMonthly : 0;
        let rentalMonthly = D.income.rentalActive ? D.income.rental : 0;
        return D.income.husband + D.income.wife + scssMonthly + fdMonthly + rentalMonthly;
    }
    function getTotalExpenses() {
        let monthlySum = D.expenses.monthly.reduce((s, e) => s + e.v, 0);
        let periodicMo = D.expenses.periodic.reduce((s, e) => s + Math.round(e.v / (e.years * 12)), 0);
        let childMo = D.children.expenses.reduce((s, e) => s + e.v, 0);
        return monthlySum + periodicMo + childMo;
    }
    function getSurplus() { return getTotalIncome() - getTotalExpenses(); }

    // ========== PAGE RENDERERS (with translations) ==========
    function renderOverview() {
        let income = getTotalIncome();
        let expenses = getTotalExpenses();
        let surplus = getSurplus();
        let scssMonthly = getScssMonthly();
        let totalLoan = D.loans.sbi.outstanding + D.loans.icici.outstanding;
        let totalScss = D.scss.dad.deposited + D.scss.mom.deposited;
        let sipVal = D.expenses.monthly.find(e => e.id === 'sip')?.v || 0;
        let otherExp = D.expenses.monthly.reduce((s, e) => s + e.v, 0) - D.loans.sbi.emi - D.loans.icici.emi - sipVal;

        let html = `
            <div class="grid-4">
                <div class="kpi-card"><div class="kpi-label">${t('monthlyIncome')}</div><div class="kpi-value" style="color:#10b981">${fl(income)}</div><div class="kpi-sub">Husband + Wife + SCSS + Rental</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('monthlySurplus')}</div><div class="kpi-value" style="color:${surplus>=0?'#6366f1':'#ef4444'}">${fl(surplus)}</div><div class="kpi-sub">Income minus expenses</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('loanOutstanding')}</div><div class="kpi-value" style="color:#ef4444">${fl(totalLoan)}</div><div class="kpi-sub">SBI + ICICI</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('scssDeposited')}</div><div class="kpi-value" style="color:#f59e0b">${fl(totalScss)}</div><div class="kpi-sub">Dad + Mom · Target ${fl(D.scss.dad.target+D.scss.mom.target)}</div></div>
            </div>
            <div class="grid-2">
                <div class="card"><div class="card-title"><i class="fas fa-arrow-up" style="color:#10b981"></i> ${t('incomeSnapshot')}</div>
                    ${row(t('husbandSalary'), ff(D.income.husband), D.income.husband>0?'#10b981':'#475569', 'income.husband')}
                    ${row(t('wifeSalary'), ff(D.income.wife), D.income.wife>0?'#10b981':'#475569', 'income.wife')}
                    ${row(t('scssPayout'), ff(scssMonthly), '#f59e0b')}
                    ${row(t('rentalWanaparthy'), D.income.rentalActive ? ff(D.income.rental) : '⏳ Pending Apr 2026', '#6366f1', 'income.rental')}
                    ${row(t('sweepFd'), D.fd.deposited ? ff(D.fd.actualMonthly) : '⏳ Not deposited', '#06b6d4')}
                </div>
                <div class="card"><div class="card-title"><i class="fas fa-arrow-down" style="color:#ef4444"></i> ${t('expenseSnapshot')}</div>
                    ${row(t('sbiLoanEmi'), ff(D.loans.sbi.emi), '#3b82f6')}
                    ${row(t('iciciLoanEmi'), ff(D.loans.icici.emi), '#8b5cf6')}
                    ${row(t('sipInvestment'), ff(sipVal), '#6366f1')}
                    ${row(t('term3cr'), ff(Math.round(252057/12))+'/mo', '#f59e0b')}
                    ${row(t('term2cr'), ff(Math.round(180110/12))+'/mo', '#a78bfa')}
                    ${row(t('healthInsurance'), ff(Math.round(69354/36))+'/mo', '#06b6d4')}
                    ${row(t('otherExpenses'), ff(otherExp), '#94a3b8')}
                </div>
            </div>
        `;
        html('page-overview', html);
    }

    function row(label, val, color, path) {
        if (editMode && path) {
            let raw = String(val).replace(/₹|,/g, '');
            return `<div class="row-flex" style="border:1px solid rgba(245,158,11,0.3); background:#1e293b; border-radius:6px; margin-bottom:5px; padding:8px 10px;">
                <span style="color:#94a3b8">${label}</span>
                <input class="yellow-input" value="${raw}" onchange="upd('${path}', this.value)" onblur="upd('${path}', this.value)">
            </div>`;
        }
        return `<div class="row-flex"><span style="color:#94a3b8">${label}</span><span style="color:${color}">${val}</span></div>`;
    }

    function upd(path, val) {
        let keys = path.split('.');
        let obj = D;
        for (let i = 0; i < keys.length-1; i++) { if (obj[keys[i]] === undefined) return; obj = obj[keys[i]]; }
        obj[keys[keys.length-1]] = num(val);
        if (path.startsWith("fd.") && (path==="fd.planned" || path==="fd.rate") && D.fd.deposited) {
            D.fd.actualMonthly = Math.round(D.fd.planned * D.fd.rate / 100 / 12);
        }
        renderCurrentPage();
    }

    function toggleEdit() { editMode = !editMode; renderCurrentPage(); }

    function renderAccounts() {
        html('page-accounts', `<div class="card"><div class="card-title"><i class="fas fa-university"></i> ${t('accounts')}</div><p style="color:#94a3b8">${t('accountsPlaceholder')}</p></div>`);
    }
    function renderInsights() {
        html('page-insights', `<div class="card"><div class="card-title"><i class="fas fa-lightbulb"></i> ${t('insights')}</div><p style="color:#94a3b8">${t('insightsPlaceholder')}</p></div>`);
    }
    function renderTransactions() {
        let mo = '';
        D.expenses.monthly.forEach((ex, idx) => {
            mo += `<div class="row-flex"><span>${ex.icon} ${ex.label}</span><span style="color:white">${ff(ex.v)}</span></div>`;
        });
        html('page-transactions', `
            <div class="card">
                <div class="card-title"><i class="fas fa-exchange-alt"></i> Recent Transactions</div>
                ${mo}
                <div class="add-btn" onclick="alert('${t('addTransaction')}')">+ ${t('addTransaction')}</div>
            </div>
        `);
    }
    function renderPlan() {
        let income = getTotalIncome();
        let expenses = getTotalExpenses();
        let steps = [t('gettingStarted') + ' 1', t('gettingStarted') + ' 2', t('gettingStarted') + ' 3']; // simplified
        let stepHtml = steps.map((s, i) => `<div class="row-flex"><span><i class="far ${i===0?'fa-circle':'fa-check-circle'}"></i> ${s}</span></div>`).join('');
        html('page-plan', `
            <div class="card">
                <div class="card-title"><i class="fas fa-calendar-check"></i> ${t('monthlyPlan')}</div>
                <div class="grid-2" style="margin-bottom:20px">
                    <div><div class="kpi-label">${t('income')}</div><div style="display:flex; justify-content:space-between"><span>${ff(income)} ${t('earned')}</span><span>₹0 ${t('budget')}</span></div></div>
                    <div><div class="kpi-label">${t('expenses')}</div><div style="display:flex; justify-content:space-between"><span>${ff(expenses)} ${t('spent')}</span><span>₹0 ${t('budget')}</span></div></div>
                </div>
                <div class="card-title">${t('gettingStarted')}</div>
                ${stepHtml}
                <div class="add-btn" onclick="alert('${t('planSetup')}')">${t('done')}</div>
            </div>
        `);
    }
    function renderDebt() { html('page-debt', `<div class="card"><div class="card-title"><i class="fas fa-hand-holding-usd"></i> ${t('debt')}</div><p style="color:#94a3b8">${t('debtPlaceholder')}</p></div>`); }
    function renderGoals() { html('page-goals', `<div class="card"><div class="card-title"><i class="fas fa-bullseye"></i> ${t('goals')}</div><p style="color:#94a3b8">${t('goalsPlaceholder')}</p></div>`); }
    function renderHelp() { html('page-help', `<div class="card"><div class="card-title"><i class="fas fa-question-circle"></i> ${t('help')}</div><p style="color:#94a3b8">${t('helpPlaceholder')}</p></div>`); }
    function renderSettings() {
        html('page-settings', `
            <div class="card">
                <div class="card-title"><i class="fas fa-cog"></i> ${t('settings')}</div>
                <div class="row-flex"><span>${t('profile')}</span><span>${currentProfile}</span></div>
                <div class="row-flex"><span>${t('darkMode')}</span><span>On</span></div>
                <div class="add-btn" onclick="alert('${t('planSetup')}')">Manage</div>
            </div>
        `);
    }

    // ========== SNAP & TRACK ==========
    let extractedItems = [];
    function captureImage() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) processReceiptImage(file);
        };
        input.click();
    }
    async function processReceiptImage(file) {
        showLoading();
        await new Promise(resolve => setTimeout(resolve, 1500));
        extractedItems = [
            { description: 'Milk', amount: 50, category: 'Groceries' },
            { description: 'Vegetables', amount: 200, category: 'Groceries' },
            { description: 'Auto fare', amount: 100, category: 'Transport' }
        ];
        hideLoading();
        showReviewDialog();
    }
    function showLoading() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'loadingOverlay';
        overlay.innerHTML = '<div class="loading"></div>';
        document.body.appendChild(overlay);
    }
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.remove();
    }
    function showReviewDialog() {
        const categories = ['Groceries', 'Transport', 'Dining', 'Utilities', 'Entertainment', 'Other'];
        let html = '<div class="modal-overlay" id="reviewOverlay"><div class="modal-content">';
        html += '<h3>📝 ' + t('Review Extracted Expenses') + '</h3>';
        extractedItems.forEach((item, idx) => {
            html += `<div class="review-item">`;
            html += `<input type="text" value="${item.description}" data-idx="${idx}" class="review-desc" placeholder="Description">`;
            html += `<input type="number" value="${item.amount}" data-idx="${idx}" class="review-amount" step="1" min="0">`;
            html += `<select data-idx="${idx}" class="review-cat">`;
            categories.forEach(cat => {
                html += `<option value="${cat}" ${cat === item.category ? 'selected' : ''}>${tc(cat)}</option>`;
            });
            html += `</select>`;
            html += `</div>`;
        });
        html += '<div class="modal-buttons">';
        html += '<button class="confirm-btn" onclick="confirmExpenses()">✅ ' + t('Add to Expenses') + '</button>';
        html += '<button class="cancel-btn" onclick="closeModal()">❌ ' + t('Cancel') + '</button>';
        html += '</div></div></div>';
        document.body.insertAdjacentHTML('beforeend', html);
    }
    function closeModal() {
        const overlay = document.getElementById('reviewOverlay');
        if (overlay) overlay.remove();
    }
    function confirmExpenses() {
        const descInputs = document.querySelectorAll('.review-desc');
        const amountInputs = document.querySelectorAll('.review-amount');
        const catSelects = document.querySelectorAll('.review-cat');
        for (let i = 0; i < extractedItems.length; i++) {
            const desc = descInputs[i]?.value || extractedItems[i].description;
            const amount = parseFloat(amountInputs[i]?.value) || extractedItems[i].amount;
            const cat = catSelects[i]?.value || extractedItems[i].category;
            D.expenses.monthly.push({ id: 'snap-' + Date.now() + '-' + i, label: desc, v: amount, icon: '📸', category: cat });
        }
        closeModal();
        renderCurrentPage();
        showTab('exp');
    }
    function showTab(tabId) {
        // simulate tab switch
        const target = document.querySelector(`[data-page="${tabId}"]`);
        if (target) target.click();
    }

    function doLogout() { alert('Logout'); location.reload(); }

    // Initial render
    renderCurrentPage();
</script>
</body>
</html>
