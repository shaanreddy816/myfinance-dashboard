<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MyFinance Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}

/* ── AUTH ── */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;background:#0f172a;padding:16px}
.abox{background:#0a0f1e;border:1px solid #1e293b;border-radius:16px;padding:32px;width:100%;max-width:400px}
.alogo{text-align:center;margin-bottom:24px}
.aicon{width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.atabs{display:flex;gap:4px;background:#1e293b;border-radius:9px;padding:4px;margin-bottom:20px}
.atab{flex:1;padding:9px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#64748b}
.atab.on{background:linear-gradient(135deg,#6366f1,#7c3aed);color:white}
.pw-wrap{position:relative;margin-bottom:10px}
.pw-wrap .ainp{padding-right:42px;margin-bottom:0}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:16px}
.ainp{width:100%;background:#1e293b;border:1px solid #334155;border-radius:9px;padding:11px 14px;color:white;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
.ainp:focus{border-color:#6366f1}
.abtn{width:100%;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;border-radius:9px;padding:13px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.abtn:disabled{opacity:0.6;pointer-events:none}
.aerr{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:7px;padding:9px 12px;color:#fca5a5;font-size:12px;margin-bottom:10px;display:none}

/* ── APP SHELL ── */
#app{display:none;width:100%}
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:#0a0f1e;border-right:1px solid #1e293b;display:flex;flex-direction:column;padding:20px 10px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50}
.sb-logo{display:flex;align-items:center;gap:8px;padding:0 10px 20px;border-bottom:1px solid #1e293b;margin-bottom:16px}
.sb-icon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-title{font-weight:800;font-size:16px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-user{padding:0 10px 16px;border-bottom:1px solid #1e293b;margin-bottom:16px}
.sb-user-name{font-size:13px;font-weight:700;margin-bottom:2px}
.sb-user-email{font-size:10px;color:#475569}
.sb-kpis{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;padding:10px;background:#1e293b;border-radius:8px}
.sb-kpi{display:flex;justify-content:space-between;align-items:center}
.sb-kpi .lbl{font-size:10px;color:#475569;text-transform:uppercase}
.sb-kpi .val{font-size:12px;font-weight:700}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#94a3b8;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;background:transparent;font-family:inherit;text-align:left;width:100%}
.nav-item .ni{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-item:hover{background:#1e293b;color:#e2e8f0}
.nav-item.on{background:linear-gradient(135deg,#6366f1,#7c3aed);color:white}
.sb-footer{border-top:1px solid #1e293b;margin-top:16px;padding-top:14px;display:flex;flex-direction:column;gap:6px}
.edit-btn{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;padding:8px;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.logout-btn{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.logout-btn:hover{color:#ef4444;border-color:#ef4444}

/* ── MAIN ── */
.main{margin-left:240px;flex:1;min-height:100vh;padding:20px 24px;max-width:100%}
.page-header{margin-bottom:20px}
.page-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-sub{font-size:12px;color:#475569;margin-top:3px}
.ebanner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 16px;color:#fbbf24;font-size:12px;font-weight:600;margin-bottom:16px;display:none;align-items:center;gap:8px}

/* ── CONTENT ── */
.page{display:none}.page.on{display:block}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px;margin-bottom:14px}
.ctitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:1100px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.g3,.g2{grid-template-columns:1fr}.sidebar{width:200px}.main{margin-left:200px}}
@media(max-width:600px){.sidebar{display:none}.main{margin-left:0}}
.kc{background:#1e293b;border-radius:10px;padding:16px}
.kc .kl{color:#64748b;font-size:9px;text-transform:uppercase;font-weight:700;margin-bottom:6px;letter-spacing:.04em}
.kc .kv{font-size:22px;font-weight:900;margin-bottom:3px}
.kc .ks{font-size:10px;color:#475569}
.prog{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin:6px 0}
.prog .bar{height:100%;border-radius:3px}
select{background:#1e293b;border:1px solid #334155;border-radius:7px;padding:6px 10px;color:white;font-size:12px;outline:none;font-family:inherit;cursor:pointer}
.addbtn{background:rgba(99,102,241,0.08);border:1px dashed rgba(99,102,241,0.35);border-radius:7px;padding:8px;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#64748b;font-size:10px;text-transform:uppercase;padding:7px 8px;text-align:left}
td{padding:7px 8px;border-top:1px solid #1e293b}
</style>
</head>
<body>

<!-- ══════════ AUTH ══════════ -->
<div id="auth">
  <div class="abox">
    <div class="alogo">
      <div class="aicon">💼</div>
      <h1 style="font-size:20px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MyFinance</h1>
      <p style="color:#475569;font-size:11px;margin-top:4px">India relocation planning · Private & secure</p>
    </div>
    <div class="atabs">
      <button class="atab on" onclick="switchAuth('login')">🔑 Sign In</button>
      <button class="atab" onclick="switchAuth('reg')">✨ Register</button>
    </div>
    <div id="aerr" class="aerr"></div>
    <div id="aform-login">
      <input id="l-em" class="ainp" type="email" placeholder="Email"/>
      <div class="pw-wrap"><input id="l-pw" class="ainp" type="password" placeholder="Password"/><button class="pw-eye" onclick="togglePw('l-pw',this)">👁️</button></div>
      <button class="abtn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="aform-reg" style="display:none">
      <input id="r-nm" class="ainp" type="text" placeholder="Full name"/>
      <input id="r-em" class="ainp" type="email" placeholder="Email"/>
      <div class="pw-wrap"><input id="r-pw" class="ainp" type="password" placeholder="Password (min 6 chars)"/><button class="pw-eye" onclick="togglePw('r-pw',this)">👁️</button></div>
      <div class="pw-wrap"><input id="r-pw2" class="ainp" type="password" placeholder="Confirm password"/><button class="pw-eye" onclick="togglePw('r-pw2',this)">👁️</button></div>
      <button class="abtn" id="regBtn" onclick="doReg()">Create Account →</button>
    </div>
    <div style="background:#1e293b;border-radius:8px;padding:10px;font-size:11px;color:#475569;margin-top:12px">🔒 Data synced securely to Supabase cloud.</div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div class="shell">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-logo">
        <div class="sb-icon">💼</div>
        <div class="sb-title">MyFinance</div>
      </div>
      <div class="sb-user">
        <div class="sb-user-name" id="uname">Dashboard</div>
        <div class="sb-user-email" id="uemail"></div>
      </div>
      <div class="sb-kpis">
        <div class="sb-kpi"><span class="lbl">Income</span><span class="val" id="t-inc" style="color:#10b981">—</span></div>
        <div class="sb-kpi"><span class="lbl">Expenses</span><span class="val" id="t-exp" style="color:#ef4444">—</span></div>
        <div class="sb-kpi"><span class="lbl">Surplus</span><span class="val" id="t-sur" style="color:#6366f1">—</span></div>
      </div>
      <div class="sb-nav">
        <button class="nav-item on" onclick="showPage('ov')"><span class="ni">📊</span> Overview</button>
        <button class="nav-item" onclick="showPage('inc')"><span class="ni">💰</span> Income</button>
        <button class="nav-item" onclick="showPage('scss')"><span class="ni">🏦</span> Schemes (SCSS)</button>
        <button class="nav-item" onclick="showPage('fd')"><span class="ni">📅</span> Sweep FD</button>
        <button class="nav-item" onclick="showPage('exp')"><span class="ni">💸</span> Expenses</button>
        <button class="nav-item" onclick="showPage('loans')"><span class="ni">🏠</span> Loans</button>
        <button class="nav-item" onclick="showPage('mf')"><span class="ni">📈</span> Mutual Funds</button>
        <button class="nav-item" onclick="showPage('ins')"><span class="ni">🛡</span> Term Insurance</button>
        <button class="nav-item" onclick="showPage('hlth')"><span class="ni">❤️</span> Health Ins</button>
        <button class="nav-item" onclick="showPage('kids')"><span class="ni">👶</span> Children</button>
        <button class="nav-item" onclick="showPage('rem')"><span class="ni">🔔</span> Reminders</button>
        <button class="nav-item" onclick="showPage('zerodha')"><span class="ni">📊</span> Zerodha AI</button>
      </div>
      <div class="sb-footer">
        <button class="edit-btn" id="ebtn" onclick="toggleEdit()">✏️ Edit Mode</button>
        <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
      <div class="ebanner" id="ebanner">
        ✏️ Edit Mode — tap any yellow value to change. Auto-saves to cloud.
        <button onclick="toggleEdit()" style="margin-left:auto;background:#f59e0b;border:none;border-radius:6px;padding:4px 12px;color:#000;font-weight:700;cursor:pointer;font-family:inherit">✅ Done</button>
      </div>

      <div id="page-ov"    class="page on"></div>
      <div id="page-inc"   class="page"></div>
      <div id="page-scss"  class="page"></div>
      <div id="page-fd"    class="page"></div>
      <div id="page-exp"   class="page"></div>
      <div id="page-loans" class="page"></div>
      <div id="page-mf"    class="page"></div>
      <div id="page-ins"   class="page"></div>
      <div id="page-hlth"  class="page"></div>
      <div id="page-kids"  class="page"></div>
      <div id="page-rem"    class="page"></div>
      <div id="page-zerodha" class="page"></div>
    </div>

  </div>
</div>

<script>
var SB="https://ffvvavyhepnxdkvurzqn.supabase.co";
var SK="sb_publishable_4AwUBcWY4fOnnJuX43v_EQ_zU-WWibr";
var sbToken=null,sbUid=null,saveTimer=null,editMode=false;

var DEF={
  income:{husband:0,wife:0,husbandLabel:"Husband Salary / Income",wifeLabel:"Wife Salary / Income",rental:115000,rentalActive:false},
  scss:{dad:{deposited:1000000,target:3000000,rate:8.2},mom:{deposited:1000000,target:3000000,rate:8.2}},
  fd:{planned:1500000,deposited:false,rate:9.0,actualMonthly:0},
  expenses:{
    monthly:[
      {id:"sbi",  label:"SBI Loan EMI",    v:73377, icon:"🏦"},
      {id:"icici",label:"ICICI Loan EMI",  v:42556, icon:"🏦"},
      {id:"maint",label:"Apt Maintenance", v:2500,  icon:"🏠"},
      {id:"maid", label:"Maid",            v:10000, icon:"🧹"},
      {id:"groc", label:"Groceries",       v:10000, icon:"🛒"},
      {id:"rest", label:"Restaurant",      v:10000, icon:"🍽️"},
      {id:"elec", label:"Electricity",     v:1000,  icon:"⚡"},
      {id:"gas",  label:"Gas Cylinder",    v:2500,  icon:"🔥"},
      {id:"petro",label:"Petrol",          v:20000, icon:"🚗"},
      {id:"sip",  label:"SIP Investment",  v:55000, icon:"📈"},
      {id:"misc", label:"Miscellaneous",   v:15000, icon:"💼"}
    ],
    periodic:[
      {id:"ins3",   label:"3Cr Term Insurance",           v:252057, icon:"🛡",  due:"15-May each year",       years:1},
      {id:"ins2",   label:"2Cr Term Insurance",           v:180110, icon:"🛡",  due:"17-Feb each year",       years:1},
      {id:"car",    label:"Car Insurance",                v:11500,  icon:"🚘", due:"Annual (renew in Mar)",   years:1},
      {id:"health", label:"Health Insurance (Me+Wife)",   v:69354,  icon:"❤️", due:"Feb 2029 (every 3yr)",   years:3},
      {id:"parents",label:"Parents Health Insurance",     v:368487, icon:"👴", due:"Feb 2029 (every 3yr)",   years:3}
    ]
  },
  loans:{
    sbi:{name:"SBI Home Loan · Hyderabad",principal:9270000,rate:7.45,emi:73377,tenure:360,paid:22,outstanding:7993315,account:"42920946856",sanctioned:"29-04-2024",emiDate:"15th of month"},
    icici:{name:"ICICI Home Loan · Wanaparthy",principal:4728780,rate:8.25,emi:42556,tenure:212,paid:10,outstanding:4638966,account:"TBMBN00007400524",sanctioned:"26-03-2025",emiDate:"10th of month"}
  },
  sip:{monthly:55000,stepUp:15,rate:12,startYear:2026},
  ins:{
    p1:{coverage:30000000,schedule:[{yr:2025,date:"15-May-2025",amt:207569,paid:true},{yr:2026,date:"15-May-2026",amt:252057,paid:false},{yr:2027,date:"15-May-2027",amt:252057,paid:false},{yr:2028,date:"15-May-2028",amt:252057,paid:false},{yr:2029,date:"15-May-2029",amt:252057,paid:false}]},
    p2:{coverage:20000000,schedule:[{yr:2026,date:"17-Feb-2026",amt:141213,paid:true},{yr:2027,date:"17-Feb-2027",amt:180110,paid:false},{yr:2028,date:"17-Feb-2028",amt:180110,paid:false},{yr:2029,date:"17-Feb-2029",amt:180110,paid:false},{yr:2030,date:"17-Feb-2030",amt:180110,paid:false}]}
  },
  health:{coverage:2500000,premium:69354,nextDue:"Feb 2029"},
  children:{expenses:[{id:"edu",label:"Education Fees",v:0,icon:"📚"},{id:"sport",label:"Sports / Activities",v:0,icon:"⚽"},{id:"other",label:"Other Children Expense",v:0,icon:"🎒"}]}
};
var D=JSON.parse(JSON.stringify(DEF));

/* ── helpers ── */
function ff(n){return "₹"+(Number(n)||0).toLocaleString("en-IN");}
function fl(n){n=Number(n)||0;if(n>=10000000)return "₹"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return "₹"+(n/100000).toFixed(1)+"L";return "₹"+n.toLocaleString("en-IN");}
function num(v){var c=String(v).replace(/[₹,\s%]/g,"");return (c!==""&&!isNaN(c))?parseFloat(c):0;}
function get(id){return document.getElementById(id);}
function setHTML(id,h){var el=get(id);if(el)el.innerHTML=h;}

function togglePw(fid,btn){var f=get(fid);if(f.type==="password"){f.type="text";btn.textContent="🙈";}else{f.type="password";btn.textContent="👁️";}}
function showErr(m){var e=get("aerr");if(e){e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none";},5000);}}
function switchAuth(t){get("aform-login").style.display=t==="login"?"block":"none";get("aform-reg").style.display=t==="reg"?"block":"none";document.querySelectorAll(".atab").forEach(function(b,i){b.classList.toggle("on",t==="login"?i===0:i===1);});}

function showPage(n){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on");});
  document.querySelectorAll(".nav-item").forEach(function(b){b.classList.remove("on");});
  var el=get("page-"+n);if(el)el.classList.add("on");
  var names=["ov","inc","scss","fd","exp","loans","mf","ins","hlth","kids","rem","zerodha"];
  var idx=names.indexOf(n);
  if(idx>=0){var btns=document.querySelectorAll(".nav-item");if(btns[idx])btns[idx].classList.add("on");}
  // re-render only the active page for speed
  renderPage(n);
}

function toggleEdit(){editMode=!editMode;get("ebtn").textContent=editMode?"✅ Done Editing":"✏️ Edit Mode";get("ebanner").style.display=editMode?"flex":"none";renderAll();}
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){try{localStorage.setItem("mf_data",JSON.stringify(D));}catch(e){}if(sbToken)sbSave(sbToken,sbUid,D);},1500);}
function upd(path,val){
  var keys=path.split(".");var obj=D;
  for(var i=0;i<keys.length-1;i++){if(obj[keys[i]]===undefined)return;obj=obj[keys[i]];}
  obj[keys[keys.length-1]]=num(val);
  if((path==="fd.planned"||path==="fd.rate")&&D.fd.deposited)D.fd.actualMonthly=Math.round(D.fd.planned*D.fd.rate/100/12);
  autoSave();renderAll();
}

/* ── row builder ── */
function row(label,val,color,path){
  color=color||"#e2e8f0";
  if(editMode&&path){
    var raw=String(val).replace(/₹|,/g,"");
    return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:7px 10px;background:#1e293b;border-radius:6px;border:1px solid rgba(245,158,11,0.3)">'
      +'<span style="color:#64748b;font-size:12px">'+label+'</span>'
      +'<input style="background:transparent;border:none;border-bottom:1px solid #f59e0b;color:#f59e0b;font-size:12px;font-weight:700;outline:none;width:120px;text-align:right;font-family:inherit" value="'+raw+'" onchange="upd(\''+path+'\',this.value)" onblur="upd(\''+path+'\',this.value)"/>'
      +'</div>';
  }
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:7px 10px;background:#1e293b;border-radius:6px">'
    +'<span style="color:#64748b;font-size:12px">'+label+'</span>'
    +'<span style="color:'+color+';font-size:12px;font-weight:700">'+val+'</span>'
    +'</div>';
}

/* ── supabase ── */
function sbFetch(path,opts){
  var ctrl=new AbortController();var tid=setTimeout(function(){ctrl.abort();},6000);
  return fetch(SB+path,Object.assign({},opts,{signal:ctrl.signal})).then(function(r){clearTimeout(tid);return r.json();}).catch(function(e){clearTimeout(tid);throw e;});
}
function sbSignin(e,p){return sbFetch("/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK},body:JSON.stringify({email:e,password:p})});}
function sbSignup(e,p,n){return sbFetch("/auth/v1/signup",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK},body:JSON.stringify({email:e,password:p,data:{display_name:n}})});}
function sbLoad(tok){return sbFetch("/rest/v1/finance_data?select=data",{headers:{"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+tok}});}
function sbSave(tok,uid,data){sbFetch("/rest/v1/finance_data",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+tok,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_id:uid,data:JSON.stringify(data),updated_at:new Date().toISOString()})}).catch(function(){});}

/* ── auth ── */
function doLogin(){
  var email=get("l-em").value.trim(),pass=get("l-pw").value;
  if(!email||!pass){showErr("Please fill all fields");return;}
  var btn=get("loginBtn");btn.disabled=true;btn.textContent="Signing in...";
  sbSignin(email,pass).then(function(d){
    btn.disabled=false;btn.textContent="Sign In →";
    if(!d.access_token){showErr(d.error_description||"Login failed");return;}
    sbToken=d.access_token;sbUid=(d.user&&d.user.id)||"user";
    var name=(d.user&&d.user.user_metadata&&d.user.user_metadata.display_name)||email.split("@")[0];
    get("uname").textContent=name;get("uemail").textContent=email;
    localStorage.setItem("mf_token",sbToken);localStorage.setItem("mf_uid",sbUid);
    localStorage.setItem("mf_name",name);localStorage.setItem("mf_email",email);
    sbLoad(sbToken).then(function(rows){if(rows&&rows[0]&&rows[0].data){try{D=JSON.parse(rows[0].data);}catch(e){}}showApp();}).catch(function(){showApp();});
  }).catch(function(e){
    btn.disabled=false;btn.textContent="Sign In →";
    var saved=localStorage.getItem("mf_data");if(saved)try{D=JSON.parse(saved);}catch(x){}
    get("uname").textContent=email.split("@")[0];get("uemail").textContent=email;
    showErr("Network issue – showing local data.");showApp();
  });
}
function doReg(){
  var name=get("r-nm").value.trim(),email=get("r-em").value.trim(),pass=get("r-pw").value,pass2=get("r-pw2").value;
  if(!name||!email||!pass){showErr("Please fill all fields");return;}
  if(pass!==pass2){showErr("Passwords do not match");return;}
  if(pass.length<6){showErr("Password must be 6+ chars");return;}
  var btn=get("regBtn");btn.disabled=true;btn.textContent="Creating...";
  sbSignup(email,pass,name).then(function(d){
    btn.disabled=false;btn.textContent="Create Account →";
    sbToken=(d.session&&d.session.access_token)||d.access_token||null;
    sbUid=(d.user&&d.user.id)||"user";
    get("uname").textContent=name;get("uemail").textContent=email;
    localStorage.setItem("mf_token",sbToken||"");localStorage.setItem("mf_uid",sbUid);
    localStorage.setItem("mf_name",name);localStorage.setItem("mf_email",email);
    showApp();
  }).catch(function(e){btn.disabled=false;btn.textContent="Create Account →";showErr("Registration failed: "+e.message);});
}
function doLogout(){
  sbToken=null;sbUid=null;
  ["mf_token","mf_uid","mf_name","mf_email","mf_data"].forEach(function(k){localStorage.removeItem(k);});
  get("app").style.display="none";get("auth").style.display="flex";
}
function showApp(){get("auth").style.display="none";get("app").style.display="block";renderAll();}

/* ── ensure data ── */
function ensureData(){
  if(!D)D={};
  if(!D.income)D.income={};
  if(D.income.husband===undefined)D.income.husband=0;
  if(D.income.wife===undefined)D.income.wife=0;
  if(!D.income.husbandLabel)D.income.husbandLabel="Husband Salary / Income";
  if(!D.income.wifeLabel)D.income.wifeLabel="Wife Salary / Income";
  if(D.income.rental===undefined)D.income.rental=115000;
  if(D.income.rentalActive===undefined)D.income.rentalActive=false;
  if(!D.scss)D.scss=JSON.parse(JSON.stringify(DEF.scss));
  if(!D.scss.dad)D.scss.dad=JSON.parse(JSON.stringify(DEF.scss.dad));
  if(!D.scss.mom)D.scss.mom=JSON.parse(JSON.stringify(DEF.scss.mom));
  if(D.scss.dad.rate===undefined)D.scss.dad.rate=8.2;
  if(D.scss.mom.rate===undefined)D.scss.mom.rate=8.2;
  if(!D.fd)D.fd=JSON.parse(JSON.stringify(DEF.fd));
  if(!D.expenses)D.expenses={monthly:[],periodic:[]};
  if(!D.expenses.monthly||!D.expenses.monthly.length)D.expenses.monthly=JSON.parse(JSON.stringify(DEF.expenses.monthly));
  if(!D.expenses.periodic||!D.expenses.periodic.length)D.expenses.periodic=JSON.parse(JSON.stringify(DEF.expenses.periodic));
  if(!D.loans)D.loans=JSON.parse(JSON.stringify(DEF.loans));
  if(!D.loans.sbi)D.loans.sbi=JSON.parse(JSON.stringify(DEF.loans.sbi));
  if(!D.loans.icici)D.loans.icici=JSON.parse(JSON.stringify(DEF.loans.icici));
  if(!D.sip)D.sip=JSON.parse(JSON.stringify(DEF.sip));
  if(!D.ins)D.ins=JSON.parse(JSON.stringify(DEF.ins));
  if(!D.ins.p1)D.ins.p1=JSON.parse(JSON.stringify(DEF.ins.p1));
  if(!D.ins.p2)D.ins.p2=JSON.parse(JSON.stringify(DEF.ins.p2));
  if(!D.ins.p1.schedule)D.ins.p1.schedule=JSON.parse(JSON.stringify(DEF.ins.p1.schedule));
  if(!D.ins.p2.schedule)D.ins.p2.schedule=JSON.parse(JSON.stringify(DEF.ins.p2.schedule));
  if(!D.health)D.health=JSON.parse(JSON.stringify(DEF.health));
  if(!D.children)D.children={expenses:[]};
  if(!D.children.expenses)D.children.expenses=[];
}

/* ── computed ── */
function getScssDadQtr(){return D.scss.dad.deposited*D.scss.dad.rate/400;}
function getScssMomQtr(){return D.scss.mom.deposited*D.scss.mom.rate/400;}
function getScssMonthly(){return Math.round((getScssDadQtr()+getScssMomQtr())/3);}
function getMonthlyExpTotal(){var t=0;for(var i=0;i<D.expenses.monthly.length;i++)t+=D.expenses.monthly[i].v;return t;}
function getPeriodicMo(){var t=0;for(var i=0;i<D.expenses.periodic.length;i++)t+=Math.round(D.expenses.periodic[i].v/(D.expenses.periodic[i].years*12));return t;}
function getChildMo(){var t=0;if(D.children&&D.children.expenses)for(var i=0;i<D.children.expenses.length;i++)t+=D.children.expenses[i].v;return t;}

/* ── renderAll ── */
function renderAll(){
  try{ensureData();}catch(e){console.error("ensureData:",e);}
  var scssMonthly=getScssMonthly();
  var fdMonthly=D.fd.deposited?D.fd.actualMonthly:0;
  var rentalMonthly=D.income.rentalActive?D.income.rental:0;
  var totalIncome=D.income.husband+D.income.wife+scssMonthly+fdMonthly+rentalMonthly;
  var totalExp=getMonthlyExpTotal()+getPeriodicMo()+getChildMo();
  var surplus=totalIncome-totalExp;
  get("t-inc").textContent=fl(totalIncome)+"/mo";
  get("t-exp").textContent=fl(totalExp)+"/mo";
  get("t-sur").textContent=fl(surplus)+"/mo";
  get("t-sur").style.color=surplus>=0?"#6366f1":"#ef4444";

  var active=document.querySelector(".page.on");
  var pid=active?active.id.replace("page-",""):"ov";
  renderPage(pid);
}

function renderPage(n){
  try{ensureData();}catch(e){}
  var scssMonthly=getScssMonthly();
  var fdMonthly=D.fd.deposited?D.fd.actualMonthly:0;
  var rentalMonthly=D.income.rentalActive?D.income.rental:0;
  var totalIncome=D.income.husband+D.income.wife+scssMonthly+fdMonthly+rentalMonthly;
  var totalExp=getMonthlyExpTotal()+getPeriodicMo()+getChildMo();
  var surplus=totalIncome-totalExp;
  switch(n){
    case "ov":    try{renderOv(totalIncome,totalExp,surplus,scssMonthly);}catch(e){console.error("ov:",e);}break;
    case "inc":   try{renderInc(scssMonthly);}catch(e){console.error("inc:",e);}break;
    case "scss":  try{renderScss();}catch(e){console.error("scss:",e);}break;
    case "fd":    try{renderFD();}catch(e){console.error("fd:",e);}break;
    case "exp":   try{renderExp();}catch(e){console.error("exp:",e);}break;
    case "loans": try{renderLoans();}catch(e){console.error("loans:",e);}break;
    case "mf":    try{renderMF();}catch(e){console.error("mf:",e);}break;
    case "ins":   try{renderIns();}catch(e){console.error("ins:",e);}break;
    case "hlth":  try{renderHlth();}catch(e){console.error("hlth:",e);}break;
    case "kids":  try{renderKids();}catch(e){console.error("kids:",e);}break;
    case "rem":     try{renderRem();}catch(e){console.error("rem:",e);}break;
    case "zerodha": try{renderZerodha();}catch(e){console.error("zerodha:",e);}break;
  }
}

function copyMcpConfig(){
  var h1="https",h2="://mcp.kite.trade/sse";
  var url=h1+h2;
  var cfg=["{","  \"mcpServers\": {","    \"kite\": {","      \"command\": \"npx\",","      \"args\": [\"mcp-remote\", \""+url+"\"]","    }","  }","}"].join("\n");
  if(navigator.clipboard){
    navigator.clipboard.writeText(cfg).then(function(){
      var btn=get("copy-cfg-btn");
      if(btn){btn.textContent="Copied!";setTimeout(function(){btn.textContent="Copy Config";},2000);}
    });
  } else {
    var ta=document.createElement("textarea");ta.value=cfg;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    var btn=get("copy-cfg-btn");if(btn){btn.textContent="Copied!";}
  }
}}
