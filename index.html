        let dadQtr = D.scss.dad.deposited * D.scss.dad.rate / 400;
        let momQtr = D.scss.mom.deposited * D.scss.mom.rate / 400;
        return Math.round((dadQtr + momQtr) / 3);
    }
    function getTotalIncome() {
        let scssMonthly = getScssMonthly();
        let fdMonthly = D.fd.deposited ? D.fd.actualMonthly : 0;
        let rentalMonthly = D.income.rentalActive ? D.income.rental : 0;
        return D.income.husband + D.income.wife + scssMonthly + fdMonthly + rentalMonthly;
    }
    function getTotalExpenses() {
        let monthlySum = D.expenses.monthly.reduce((s, e) => s + e.v, 0);
        let periodicMo = D.expenses.periodic.reduce((s, e) => s + Math.round(e.v / (e.years * 12)), 0);
        let childMo = D.children.expenses.reduce((s, e) => s + e.v, 0);
        return monthlySum + periodicMo + childMo;
    }
    function getSurplus() { return getTotalIncome() - getTotalExpenses(); }

    // ========== PAGE RENDERERS ==========
    function renderOverview() {
        let income = getTotalIncome();
        let expenses = getTotalExpenses();
        let surplus = getSurplus();
        let scssMonthly = getScssMonthly();
        let totalLoan = D.loans.sbi.outstanding + D.loans.icici.outstanding;
        let totalScss = D.scss.dad.deposited + D.scss.mom.deposited;
        let sipVal = D.expenses.monthly.find(e => e.id === 'sip')?.v || 0;
        let otherExp = D.expenses.monthly.reduce((s, e) => s + e.v, 0) - D.loans.sbi.emi - D.loans.icici.emi - sipVal;

        let htmlContent = `
            <div class="grid-4">
                <div class="kpi-card"><div class="kpi-label">${t('monthlyIncome')}</div><div class="kpi-value" style="color:#10b981">${fl(income)}</div><div class="kpi-sub">Husband + Wife + SCSS + Rental</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('monthlySurplus')}</div><div class="kpi-value" style="color:${surplus>=0?'#6366f1':'#ef4444'}">${fl(surplus)}</div><div class="kpi-sub">Income minus expenses</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('loanOutstanding')}</div><div class="kpi-value" style="color:#ef4444">${fl(totalLoan)}</div><div class="kpi-sub">SBI + ICICI</div></div>
                <div class="kpi-card"><div class="kpi-label">${t('scssDeposited')}</div><div class="kpi-value" style="color:#f59e0b">${fl(totalScss)}</div><div class="kpi-sub">Dad + Mom · Target ${fl(D.scss.dad.target+D.scss.mom.target)}</div></div>
            </div>
            <div class="grid-2">
                <div class="card"><div class="card-title"><i class="fas fa-arrow-up" style="color:#10b981"></i> ${t('incomeSnapshot')}</div>
                    ${row(t('husbandSalary'), ff(D.income.husband), D.income.husband>0?'#10b981':'#475569', 'income.husband')}
                    ${row(t('wifeSalary'), ff(D.income.wife), D.income.wife>0?'#10b981':'#475569', 'income.wife')}
                    ${row(t('scssPayout'), ff(scssMonthly), '#f59e0b')}
                    ${row(t('rentalWanaparthy'), D.income.rentalActive ? ff(D.income.rental) : '⏳ Pending Apr 2026', '#6366f1', 'income.rental')}
                    ${row(t('sweepFd'), D.fd.deposited ? ff(D.fd.actualMonthly) : '⏳ Not deposited', '#06b6d4')}
                </div>
                <div class="card"><div class="card-title"><i class="fas fa-arrow-down" style="color:#ef4444"></i> ${t('expenseSnapshot')}</div>
                    ${row(t('sbiLoanEmi'), ff(D.loans.sbi.emi), '#3b82f6')}
                    ${row(t('iciciLoanEmi'), ff(D.loans.icici.emi), '#8b5cf6')}
                    ${row(t('sipInvestment'), ff(sipVal), '#6366f1')}
                    ${row(t('term3cr'), ff(Math.round(252057/12))+'/mo', '#f59e0b')}
                    ${row(t('term2cr'), ff(Math.round(180110/12))+'/mo', '#a78bfa')}
                    ${row(t('healthInsurance'), ff(Math.round(69354/36))+'/mo', '#06b6d4')}
                    ${row(t('otherExpenses'), ff(otherExp), '#94a3b8')}
                </div>
            </div>
        `;
        html('page-overview', htmlContent);
    }

    function row(label, val, color, path) {
        if (editMode && path) {
            let raw = String(val).replace(/₹|,/g, '');
            return `<div class="row-flex" style="border:1px solid rgba(245,158,11,0.3); background:#1e293b; border-radius:6px; margin-bottom:5px; padding:8px 10px;">
                <span style="color:#94a3b8">${label}</span>
                <input class="yellow-input" value="${raw}" onchange="upd('${path}', this.value)" onblur="upd('${path}', this.value)">
            </div>`;
        }
        return `<div class="row-flex"><span style="color:#94a3b8">${label}</span><span style="color:${color}">${val}</span></div>`;
    }

    function upd(path, val) {
        let keys = path.split('.');
        let obj = D;
        for (let i = 0; i < keys.length-1; i++) { if (obj[keys[i]] === undefined) return; obj = obj[keys[i]]; }
        obj[keys[keys.length-1]] = num(val);
        if (path.startsWith("fd.") && (path==="fd.planned" || path==="fd.rate") && D.fd.deposited) {
            D.fd.actualMonthly = Math.round(D.fd.planned * D.fd.rate / 100 / 12);
        }
        renderCurrentPage();
    }

    function toggleEdit() { editMode = !editMode; renderCurrentPage(); }

    function renderAccounts() { html('page-accounts', `<div class="card">${t('accountsPlaceholder')}</div>`); }
    function renderInsights() { html('page-insights', `<div class="card">${t('insightsPlaceholder')}</div>`); }
    function renderTransactions() { 
        let mo = D.expenses.monthly.map(ex => `<div class="row-flex"><span>${ex.icon} ${ex.label}</span><span style="color:white">${ff(ex.v)}</span></div>`).join('');
        html('page-transactions', `<div class="card"><h3>Recent Transactions</h3>${mo}<div class="add-btn">+ Add</div></div>`);
    }
    function renderPlan() { html('page-plan', `<div class="card">Plan page</div>`); }
    function renderDebt() { html('page-debt', `<div class="card">Debt page</div>`); }
    function renderGoals() { html('page-goals', `<div class="card">Goals page</div>`); }
    function renderHelp() { html('page-help', `<div class="card">Help page</div>`); }
    function renderSettings() { html('page-settings', `<div class="card">Settings – Profile: ${currentProfile}</div>`); }

    // ========== ADVISOR ==========
    function renderAdvisor() {
        const age = parseInt(localStorage.getItem('user_age')) || 40;
        let alloc = age<30? {largeCap:50,midCap:25,smallCap:15,international:10,debt:0} :
                    age<40? {largeCap:45,midCap:25,smallCap:10,international:10,debt:10} :
                    age<50? {largeCap:40,midCap:20,smallCap:10,international:15,debt:15} :
                    age<60? {largeCap:35,midCap:15,smallCap:5,international:15,debt:30} :
                    {largeCap:30,midCap:10,smallCap:0,international:10,debt:50};
        let allocationHtml = `<div class="grid-2"><div>Large Cap: ${alloc.largeCap}%</div><div>Mid Cap: ${alloc.midCap}%</div><div>Small Cap: ${alloc.smallCap}%</div><div>International: ${alloc.international}%</div><div>Debt: ${alloc.debt}%</div></div>`;
        const niftyHtml = `<div class="card"><h3>Nifty Index Performance</h3><p>Nifty 50: 13.5% CAGR (10y) · Nifty Next 50: 16% CAGR (10y)</p></div>`;
        
        // Claude card (copy prompt)
        const claudeCard = `
        <div class="card">
            <div class="card-title"><i class="fas fa-robot"></i> AI Portfolio Assistant (Claude)</div>
            <p>Your Zerodha MCP server is running. Ask Claude to analyze your portfolio.</p>
            <div style="background:#1e293b; padding:10px; border-radius:6px; margin:10px 0;">
                <code>Show me my Zerodha portfolio with current P&L</code>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="add-btn" onclick="copyPrompt()">📋 Copy Prompt</button>
                <button class="add-btn" onclick="window.open('claude://', '_blank')">🚀 Open Claude</button>
            </div>
        </div>`;
        
        // New Zerodha Connect Card
        const connectZerodhaCard = `
        <div class="card">
            <div class="card-title"><i class="fas fa-link"></i> Connect Zerodha (Live Data)</div>
            <p>Securely connect your Zerodha account to view real mutual fund holdings and portfolio data directly in FamLedgerAI.</p>
            <button class="add-btn" onclick="connectZerodha()" style="background:linear-gradient(135deg,#f59e0b,#d97706); border:none; color:white;">🔗 Connect Zerodha</button>
            <p style="font-size:11px; color:#475569; margin-top:12px;">You will be redirected to Zerodha to log in and authorize access. After login, you'll be brought back to see your data.</p>
        </div>`;
        
        html('page-advisor', niftyHtml + `<div class="card"><h3>Recommended Allocation (Age ${age})</h3>${allocationHtml}</div>` + claudeCard + connectZerodhaCard);
    }

    function copyPrompt() {
        const prompt = "Show me my Zerodha portfolio with current P&L";
        navigator.clipboard.writeText(prompt).then(() => alert("Prompt copied! Paste it into Claude."));
    }

    // ========== ZERODHA OAUTH CONNECTION ==========
    function connectZerodha() {
    alert('KITE_API_KEY is: "' + KITE_API_KEY + '"');
    if (KITE_API_KEY === '') {
        alert('Please set your Kite Connect API key in the script (replace hxibmuy0fm8jdbif).');
        return;
    }
    const loginUrl = `https://kite.zerodha.com/connect/login?api_key=${KITE_API_KEY}&v=3&redirect_uri=${REDIRECT_URI}`;

}

    // ========== SNAP & TRACK MOCK ==========
    function captureImage() {
        alert("Snap & Track: In a real app, you would take a photo and AI would extract expenses. For demo, we'll add mock data.");
        D.expenses.monthly.push({ id: 'snap-'+Date.now(), label: 'Snapped Expense', v: 500, icon: '📸', category: 'Other' });
        renderCurrentPage();
    }

    // ========== AUTH ==========
    function switchAuth(mode) {
        document.getElementById('aform-login').style.display = mode==='login' ? 'block' : 'none';
        document.getElementById('aform-reg').style.display = mode==='reg' ? 'block' : 'none';
        document.querySelectorAll('.atab').forEach((b,i) => b.classList.toggle('on', (mode==='login' && i===0) || (mode==='reg' && i===1)));
    }
    function doLogin() {
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        // set default age
        localStorage.setItem('user_age', 40);
        renderCurrentPage();
    }
    function doReg() {
        let age = document.getElementById('r-age')?.value || 40;
        localStorage.setItem('user_age', age);
        doLogin();
    }
    function doLogout() {
        document.getElementById('auth').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }

    // ========== LANGUAGE CHANGE (dummy) ==========
    function changeLanguage(lang) {
        currentLang = lang;
        alert('Language changed to ' + lang + ' (demo)');
    }

    // ========== INIT ==========
    window.onload = function() {
        // Show auth by default
        document.getElementById('auth').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        // Pre-fill for demo
        document.getElementById('l-em').value = 'demo@example.com';
        document.getElementById('l-pw').value = 'demo123';
    };
</script>
