<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MyFinance Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020817;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
/* AUTH */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.abox{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:32px;width:100%;max-width:400px}
.alogo{text-align:center;margin-bottom:24px}
.aicon{width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
.atabs{display:flex;gap:4px;background:#1e293b;border-radius:9px;padding:4px;margin-bottom:20px}
.atab{flex:1;padding:9px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#64748b}
.atab.on{background:linear-gradient(135deg,#6366f1,#7c3aed);color:white}
.ainp{width:100%;background:#1e293b;border:1px solid #334155;border-radius:9px;padding:11px 14px;color:white;font-size:13px;outline:none;font-family:inherit;margin-bottom:10px}
.ainp:focus{border-color:#6366f1}
.abtn{width:100%;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;border-radius:9px;padding:13px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.aerr{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:7px;padding:9px 12px;color:#fca5a5;font-size:12px;margin-bottom:10px;display:none}
/* APP */
#app{display:none}
.topbar{background:#0a0f1e;border-bottom:1px solid #1e293b;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:10px}
.ticon{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.tr{display:flex;align-items:center;gap:8px}
.tkpi{font-size:11px;text-align:right;margin-right:6px}
.tkpi .tl2{color:#475569;font-size:9px;text-transform:uppercase;letter-spacing:.04em}
.tkpi .tv{font-weight:800;font-size:13px}
.ebtn{background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;padding:7px 16px;color:white;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.lbtn{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:7px 14px;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit}
/* TABS */
.tabs{display:flex;padding:0 12px;background:#0a0f1e;border-bottom:1px solid #1e293b;overflow-x:auto;gap:0}
.tabs::-webkit-scrollbar{height:3px}
.ttab{padding:11px 13px;border:none;background:transparent;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent}
.ttab.on{color:#6366f1;border-bottom-color:#6366f1}
/* CONTENT */
.content{padding:16px;max-width:1400px;margin:0 auto}
.tc{display:none}.tc.on{display:block}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:16px;margin-bottom:12px}
.ctitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:800px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
.kc{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px}
.kc .kl{color:#64748b;font-size:9px;text-transform:uppercase;font-weight:700;margin-bottom:5px;letter-spacing:.04em}
.kc .kv{font-size:20px;font-weight:900;margin-bottom:3px}
.kc .ks{font-size:10px;color:#475569}
.prog{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin:6px 0}
.prog .bar{height:100%;border-radius:3px}
.ebanner{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 16px;color:#fbbf24;font-size:12px;font-weight:600;margin-bottom:14px;display:none;align-items:center;gap:8px}
select{background:#1e293b;border:1px solid #334155;border-radius:7px;padding:6px 10px;color:white;font-size:12px;outline:none;font-family:inherit;cursor:pointer}
.addbtn{background:rgba(99,102,241,0.08);border:1px dashed rgba(99,102,241,0.35);border-radius:7px;padding:8px;color:#6366f1;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:8px}
</style>
</head>
<body>

<div id="auth">
  <div class="abox">
    <div class="alogo">
      <div class="aicon">💼</div>
      <h1 style="font-size:20px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MyFinance Dashboard</h1>
      <p style="color:#475569;font-size:11px;margin-top:4px">India relocation planning · Private & secure</p>
    </div>
    <div class="atabs">
      <button class="atab on" onclick="switchAuth('login')">🔑 Sign In</button>
      <button class="atab" onclick="switchAuth('reg')">✨ Register</button>
    </div>
    <div id="aerr" class="aerr"></div>
    <div id="aform-login">
      <input id="l-em" class="ainp" type="email" placeholder="Email"/>
      <input id="l-pw" class="ainp" type="password" placeholder="Password"/>
      <button class="abtn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="aform-reg" style="display:none">
      <input id="r-nm" class="ainp" type="text" placeholder="Full name"/>
      <input id="r-em" class="ainp" type="email" placeholder="Email"/>
      <input id="r-pw" class="ainp" type="password" placeholder="Password (min 6 chars)"/>
      <input id="r-pw2" class="ainp" type="password" placeholder="Confirm password"/>
      <button class="abtn" onclick="doReg()">Create Account →</button>
    </div>
    <div style="background:#1e293b;border-radius:8px;padding:10px;font-size:11px;color:#475569;margin-top:12px">🔒 Data synced securely to Supabase cloud.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tl">
      <div class="ticon">💼</div>
      <div>
        <div id="uname" style="font-size:13px;font-weight:700">Dashboard</div>
        <div id="uemail" style="font-size:10px;color:#475569"></div>
      </div>
    </div>
    <div class="tr">
      <div class="tkpi"><div class="tl2">Income/mo</div><div class="tv" id="t-inc" style="color:#10b981">—</div></div>
      <div class="tkpi"><div class="tl2">Expenses/mo</div><div class="tv" id="t-exp" style="color:#ef4444">—</div></div>
      <div class="tkpi"><div class="tl2">Surplus</div><div class="tv" id="t-sur" style="color:#6366f1">—</div></div>
      <button class="ebtn" id="ebtn" onclick="toggleEdit()">✏️ Edit</button>
      <button class="lbtn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="tabs">
    <button class="ttab on" onclick="showTab('ov')">📊 Overview</button>
    <button class="ttab" onclick="showTab('inc')">💰 Income</button>
    <button class="ttab" onclick="showTab('scss')">🏦 Schemes</button>
    <button class="ttab" onclick="showTab('fd')">📅 FD</button>
    <button class="ttab" onclick="showTab('exp')">💸 Expenses</button>
    <button class="ttab" onclick="showTab('loans')">🏠 Loans</button>
    <button class="ttab" onclick="showTab('mf')">📈 Mutual Funds</button>
    <button class="ttab" onclick="showTab('ins')">🛡 Term Insurance</button>
    <button class="ttab" onclick="showTab('hlth')">❤️ Health Ins</button>
    <button class="ttab" onclick="showTab('kids')">👶 Children</button>
    <button class="ttab" onclick="showTab('rem')">🔔 Reminders</button>
  </div>
  <div class="content">
    <div class="ebanner" id="ebanner">✏️ Edit Mode — tap any yellow value to change. Auto-saves to cloud.
      <button onclick="toggleEdit()" style="margin-left:auto;background:#f59e0b;border:none;border-radius:6px;padding:4px 12px;color:#000;font-weight:700;cursor:pointer;font-family:inherit">✅ Done</button>
    </div>
    <div id="tab-ov" class="tc on"></div>
    <div id="tab-inc" class="tc"></div>
    <div id="tab-scss" class="tc"></div>
    <div id="tab-fd" class="tc"></div>
    <div id="tab-exp" class="tc"></div>
    <div id="tab-loans" class="tc"></div>
    <div id="tab-mf" class="tc"></div>
    <div id="tab-ins" class="tc"></div>
    <div id="tab-hlth" class="tc"></div>
    <div id="tab-kids" class="tc"></div>
    <div id="tab-rem" class="tc"></div>
  </div>
</div>

<script>
var SB="https://ffvvavyhepnxdkvurzqn.supabase.co";
var SK="sb_publishable_4AwUBcWY4fOnnJuX43v_EQ_zU-WWibr";
var sbToken=null,sbUid=null,saveTimer=null,editMode=false;

// ── DEFAULT DATA ──
var DEF={
  income:{husband:0,wife:0,husbandLabel:"Husband Salary / Income",wifeLabel:"Wife Salary / Income",rental:115000,rentalActive:false},
  scss:{dad:{deposited:1000000,target:3000000,rate:8.2,qtrPayout:20500,targetQtrPayout:61500},
        mom:{deposited:1000000,target:3000000,rate:8.2,qtrPayout:20500,targetQtrPayout:61500}},
  fd:{planned:1500000,deposited:false,rate:9.0,targetMonthly:9060,actualMonthly:0},
  expenses:{
    monthly:[
      {id:"sbi",  label:"SBI Loan EMI",     v:73377, icon:"🏦"},
      {id:"icici",label:"ICICI Loan EMI",   v:42556, icon:"🏦"},
      {id:"maint",label:"Apt Maintenance",  v:2500,  icon:"🏠"},
      {id:"maid", label:"Maid",             v:10000, icon:"🧹"},
      {id:"groc", label:"Groceries",        v:10000, icon:"🛒"},
      {id:"rest", label:"Restaurant",       v:10000, icon:"🍽️"},
      {id:"elec", label:"Electricity",      v:1000,  icon:"⚡"},
      {id:"gas",  label:"Gas Cylinder",     v:2500,  icon:"🔥"},
      {id:"petro",label:"Petrol",           v:20000, icon:"🚗"},
      {id:"sip",  label:"SIP Investment",   v:55000, icon:"📈"},
      {id:"misc", label:"Miscellaneous",    v:15000, icon:"💼"}
    ],
    yearly:[
      {id:"ins3",  label:"3Cr Term Insurance",  v:252057, icon:"🛡", due:"15-May each year"},
      {id:"ins2",  label:"2Cr Term Insurance",  v:180110, icon:"🛡", due:"17-Feb each year"},
      {id:"health",label:"Health Insurance",    v:69354,  icon:"❤️", due:"Feb 2029 (every 3yr)"}
    ]
  },
  loans:{
    sbi:{name:"SBI Home Loan · Hyderabad",principal:9270000,rate:7.45,emi:73377,tenure:360,paid:22,outstanding:7993315,account:"42920946856",sanctioned:"29-04-2024",emiDate:"15th of month"},
    icici:{name:"ICICI Home Loan · Wanaparthy",principal:4728780,rate:8.25,emi:42556,tenure:212,paid:10,outstanding:4638966,account:"TBMBN00007400524",sanctioned:"26-03-2025",emiDate:"10th of month"}
  },
  sip:{monthly:55000,stepUp:15,rate:12,startYear:2026},
  ins:{
    p1:{coverage:30000000,
      schedule:[{yr:2025,date:"15-May-2025",amt:207569,paid:true},{yr:2026,date:"15-May-2026",amt:252057,paid:false},{yr:2027,date:"15-May-2027",amt:252057,paid:false},{yr:2028,date:"15-May-2028",amt:252057,paid:false},{yr:2029,date:"15-May-2029",amt:252057,paid:false}]},
    p2:{coverage:20000000,
      schedule:[{yr:2026,date:"17-Feb-2026",amt:141213,paid:true},{yr:2027,date:"17-Feb-2027",amt:180110,paid:false},{yr:2028,date:"17-Feb-2028",amt:180110,paid:false},{yr:2029,date:"17-Feb-2029",amt:180110,paid:false},{yr:2030,date:"17-Feb-2030",amt:180110,paid:false}]}
  },
  health:{coverage:2500000,premium:69354,nextDue:"Feb 2029"},
  children:{expenses:[
    {id:"edu",  label:"Education Fees",        v:0,icon:"📚"},
    {id:"sport",label:"Sports / Activities",   v:0,icon:"⚽"},
    {id:"other",label:"Other Children Expense",v:0,icon:"🎒"}
  ]}
};

var D=JSON.parse(JSON.stringify(DEF));

// ── HELPERS ──
function ff(n){return "₹"+(Number(n)||0).toLocaleString("en-IN");}
function fl(n){n=Number(n)||0;if(n>=10000000)return "₹"+(n/10000000).toFixed(2)+"Cr";if(n>=100000)return "₹"+(n/100000).toFixed(1)+"L";return "₹"+n.toLocaleString("en-IN");}
function num(v){var c=String(v).replace(/[₹,\s%]/g,"");return (c!==""&&!isNaN(c))?parseFloat(c):0;}
function get(id){return document.getElementById(id);}
function html(id,h){var el=get(id);if(el)el.innerHTML=h;}

function showErr(m){var e=get("aerr");if(e){e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none";},5000);}}
function switchAuth(t){
  get("aform-login").style.display=t==="login"?"block":"none";
  get("aform-reg").style.display=t==="reg"?"block":"none";
  document.querySelectorAll(".atab").forEach(function(b,i){b.classList.toggle("on",t==="login"?i===0:i===1);});
}
function showTab(n){
  document.querySelectorAll(".tc").forEach(function(t){t.classList.remove("on");});
  document.querySelectorAll(".ttab").forEach(function(t){t.classList.remove("on");});
  var el=get("tab-"+n);if(el)el.classList.add("on");
  var names=["ov","inc","scss","fd","exp","loans","mf","ins","hlth","kids","rem"];
  var idx=names.indexOf(n);
  if(idx>=0){var tabs=document.querySelectorAll(".ttab");if(tabs[idx])tabs[idx].classList.add("on");}
}
function toggleEdit(){
  editMode=!editMode;
  get("ebtn").textContent=editMode?"✅ Done":"✏️ Edit";
  get("ebanner").style.display=editMode?"flex":"none";
  renderAll();
}
function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){if(sbToken)sbSave(sbToken,sbUid,D);},1500);}
function upd(path,val){
  var keys=path.split(".");var obj=D;
  for(var i=0;i<keys.length-1;i++){if(obj[keys[i]]===undefined)return;obj=obj[keys[i]];}
  var v=num(val); obj[keys[keys.length-1]]=v;
  autoSave();renderAll();
}
function updStr(path,val){
  var keys=path.split(".");var obj=D;
  for(var i=0;i<keys.length-1;i++){if(obj[keys[i]]===undefined)return;obj=obj[keys[i]];}
  obj[keys[keys.length-1]]=val;
  autoSave();renderAll();
}

// ── ROW ──
function row(label,val,color,path){
  color=color||"#e2e8f0";
  if(editMode&&path){
    var raw=String(val).replace(/₹|,/g,"");
    return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:7px 10px;background:#1e293b;border-radius:6px;border:1px solid rgba(245,158,11,0.3)">'
      +'<span style="color:#64748b;font-size:12px">'+label+'</span>'
      +'<input style="background:transparent;border:none;border-bottom:1px solid #f59e0b;color:#f59e0b;font-size:12px;font-weight:700;outline:none;width:120px;text-align:right;font-family:inherit" value="'+raw+'" onchange="upd(\''+path+'\',this.value)" onblur="upd(\''+path+'\',this.value)"/>'
      +'</div>';
  }
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:7px 10px;background:#1e293b;border-radius:6px">'
    +'<span style="color:#64748b;font-size:12px">'+label+'</span>'
    +'<span style="color:'+color+';font-size:12px;font-weight:700">'+val+'</span>'
    +'</div>';
}

// ── SUPABASE ──
function sbFetch(path,opts){return fetch(SB+path,opts).then(function(r){return r.json();});}
function sbSignup(email,pass,name){
  return sbFetch("/auth/v1/signup",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK},body:JSON.stringify({email:email,password:pass,data:{display_name:name}})});
}
function sbSignin(email,pass){
  return sbFetch("/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK},body:JSON.stringify({email:email,password:pass})});
}
function sbLoad(token){
  return sbFetch("/rest/v1/finance_data?select=data",{headers:{"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+token}});
}
function sbSave(token,uid,data){
  // Also save to localStorage as backup
  try{localStorage.setItem("mf_data", JSON.stringify(data));}catch(e){}
  return sbFetch("/rest/v1/finance_data",{method:"POST",headers:{"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+token,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_id:uid,data:JSON.stringify(data),updated_at:new Date().toISOString()})});
}

// ── AUTH ──
function doLogin(){
  var email=get("l-em").value.trim(),pass=get("l-pw").value;
  if(!email||!pass){showErr("Please fill all fields");return;}
  sbSignin(email,pass).then(function(d){
    if(!d.access_token){showErr(d.error_description||d.msg||"Login failed");return;}
    sbToken=d.access_token;
    sbUid=(d.user&&d.user.id)||"user";
    var name=(d.user&&d.user.user_metadata&&d.user.user_metadata.display_name)||email.split("@")[0];
    get("uname").textContent=name+"'s Finance Dashboard";
    get("uemail").textContent=email;
    localStorage.setItem("mf_token", sbToken);
    localStorage.setItem("mf_uid", sbUid);
    localStorage.setItem("mf_name", get("uname").textContent);
    localStorage.setItem("mf_email", email);
    sbLoad(sbToken).then(function(rows){
      if(rows&&rows[0]&&rows[0].data){try{D=JSON.parse(rows[0].data);}catch(e){}}
      showApp();
    }).catch(function(){showApp();});
  }).catch(function(e){showErr("Login failed: "+e.message);});
}
function doReg(){
  var name=get("r-nm").value.trim(),email=get("r-em").value.trim(),pass=get("r-pw").value,pass2=get("r-pw2").value;
  if(!name||!email||!pass){showErr("Please fill all fields");return;}
  if(pass!==pass2){showErr("Passwords do not match");return;}
  if(pass.length<6){showErr("Password must be 6+ chars");return;}
  sbSignup(email,pass,name).then(function(d){
    sbToken=(d.session&&d.session.access_token)||d.access_token||null;
    sbUid=(d.user&&d.user.id)||"user";
    get("uname").textContent=name+"'s Finance Dashboard";
    get("uemail").textContent=email;
    if(sbToken){
      localStorage.setItem("mf_token", sbToken);
      localStorage.setItem("mf_uid", sbUid);
      localStorage.setItem("mf_name", name+"'s Finance Dashboard");
      localStorage.setItem("mf_email", email);
    }
    showApp();
  }).catch(function(e){showErr("Registration failed: "+e.message);});
}
function doLogout(){
  sbToken=null;sbUid=null;
  localStorage.removeItem("mf_token");
  localStorage.removeItem("mf_uid");
  localStorage.removeItem("mf_name");
  localStorage.removeItem("mf_email");
  localStorage.removeItem("mf_data");
  get("app").style.display="none";
  get("auth").style.display="flex";
}
function showApp(){get("auth").style.display="none";get("app").style.display="block";renderAll();}

// ── ENSURE DATA STRUCTURE (FIXED: ensure insurance schedules exist) ──
function ensureData(){
  if(!D)D={};
  if(!D.income)D.income={};
  if(D.income.husband===undefined)D.income.husband=0;
  if(D.income.wife===undefined)D.income.wife=0;
  if(!D.income.husbandLabel)D.income.husbandLabel="Husband Salary / Income";
  if(!D.income.wifeLabel)D.income.wifeLabel="Wife Salary / Income";
  if(D.income.rental===undefined)D.income.rental=115000;
  if(D.income.rentalActive===undefined)D.income.rentalActive=false;
  if(!D.scss)D.scss=JSON.parse(JSON.stringify(DEF.scss));
  if(!D.scss.dad)D.scss.dad=JSON.parse(JSON.stringify(DEF.scss.dad));
  if(!D.scss.mom)D.scss.mom=JSON.parse(JSON.stringify(DEF.scss.mom));
  if(!D.fd)D.fd=JSON.parse(JSON.stringify(DEF.fd));
  if(!D.expenses)D.expenses={monthly:[],yearly:[]};
  if(!D.expenses.monthly||!D.expenses.monthly.length)D.expenses.monthly=JSON.parse(JSON.stringify(DEF.expenses.monthly));
  if(!D.expenses.yearly||!D.expenses.yearly.length)D.expenses.yearly=JSON.parse(JSON.stringify(DEF.expenses.yearly));
  if(!D.loans)D.loans=JSON.parse(JSON.stringify(DEF.loans));
  if(!D.loans.sbi)D.loans.sbi=JSON.parse(JSON.stringify(DEF.loans.sbi));
  if(!D.loans.icici)D.loans.icici=JSON.parse(JSON.stringify(DEF.loans.icici));
  if(!D.sip)D.sip=JSON.parse(JSON.stringify(DEF.sip));
  if(!D.ins)D.ins=JSON.parse(JSON.stringify(DEF.ins));
  if(!D.ins.p1)D.ins.p1=JSON.parse(JSON.stringify(DEF.ins.p1));
  if(!D.ins.p2)D.ins.p2=JSON.parse(JSON.stringify(DEF.ins.p2));
  // Ensure schedules exist (fix for empty term insurance)
  if(D.ins.p1 && !D.ins.p1.schedule) D.ins.p1.schedule = JSON.parse(JSON.stringify(DEF.ins.p1.schedule));
  if(D.ins.p2 && !D.ins.p2.schedule) D.ins.p2.schedule = JSON.parse(JSON.stringify(DEF.ins.p2.schedule));
  if(!D.health)D.health=JSON.parse(JSON.stringify(DEF.health));

// ── RENDER ALL ──
function renderAll(){
  try{ensureData();}catch(e){console.error("ensureData error:",e);}

  // Compute totals
  var scssMonthly=Math.round((D.scss.dad.qtrPayout+D.scss.mom.qtrPayout)/3);
  var fdMonthly=D.fd.deposited?D.fd.actualMonthly:0;
  var rentalMonthly=D.income.rentalActive?D.income.rental:0;
  var totalIncome=D.income.husband+D.income.wife+scssMonthly+fdMonthly+rentalMonthly;

  var monthlyExpTotal=0;
  for(var i=0;i<D.expenses.monthly.length;i++)monthlyExpTotal+=D.expenses.monthly[i].v;
  // Yearly expenses amortized monthly
  var yearlyMo=0;
  for(var j=0;j<D.expenses.yearly.length;j++){
    var ye=D.expenses.yearly[j];
    yearlyMo+=ye.id==="health"?Math.round(ye.v/36):Math.round(ye.v/12);
  }
  var childMo=0;
  if(D.children&&D.children.expenses){for(var k=0;k<D.children.expenses.length;k++)childMo+=D.children.expenses[k].v;}
  var totalExp=monthlyExpTotal+yearlyMo+childMo;
  var surplus=totalIncome-totalExp;

  // Topbar
  get("t-inc").textContent=fl(totalIncome)+"/mo";
  get("t-exp").textContent=fl(totalExp)+"/mo";
  get("t-sur").textContent=fl(surplus)+"/mo";
  get("t-sur").style.color=surplus>=0?"#6366f1":"#ef4444";

  try{renderOv(totalIncome,totalExp,surplus,scssMonthly,yearlyMo);}catch(e){console.error("renderOv:",e);}
  try{renderInc(scssMonthly);}catch(e){console.error("renderInc:",e);}
  try{renderScss();}catch(e){console.error("renderScss:",e);}
  try{renderFD();}catch(e){console.error("renderFD:",e);}
  try{renderExp(yearlyMo);}catch(e){console.error("renderExp:",e);}
  try{renderLoans();}catch(e){console.error("renderLoans:",e);}
  try{renderMF();}catch(e){console.error("renderMF:",e);}
  try{renderIns();}catch(e){console.error("renderIns:",e);}
  try{renderHlth();}catch(e){console.error("renderHlth:",e);}
  try{renderKids();}catch(e){console.error("renderKids:",e);}
  try{renderRem();}catch(e){console.error("renderRem:",e);}
}

        +'<td style="padding:7px 8px;color:#94a3b8">'+s.yr+'</td>'
        +'<td style="padding:7px 8px;color:#94a3b8">'+s.date+'</td>'
        +'<td style="padding:7px 8px;text-align:right;color:'+c+';font-weight:700">'+ff(s.amt)+'</td>'
        +'<td style="padding:7px 8px;text-align:center"><span style="background:'+(s.paid?"rgba(16,185,129,0.1)":"rgba(245,158,11,0.1)")+';color:'+(s.paid?"#10b981":"#f59e0b")+';border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700">'+(s.paid?"✅ Paid":"⏳ Due")+'</span></td>'
        +'</tr>';
    }
    h+='</table></div>';
    return '<div class="card">'+h+'</div>';
  };
  html("tab-ins",'<div class="g2">'+insCard(D.ins.p1,"#f59e0b","3 CRORE TERM INSURANCE")+insCard(D.ins.p2,"#a78bfa","2 CRORE TERM INSURANCE")+'</div>');
}

// ── HEALTH ──
function renderHlth(){
  var h=row("Coverage",fl(D.health.coverage),"#10b981")
    +row("Premium Paid (Feb 2026)",ff(D.health.premium),"#06b6d4","health.premium")
    +row("Next Due",D.health.nextDue,"#fbbf24")
    +row("Type","Family Floater","#94a3b8")
    +'<div style="background:rgba(6,182,212,0.07);border:1px solid rgba(6,182,212,0.2);border-radius:7px;padding:10px;margin-top:8px;font-size:11px;color:#64748b">'
    +'ℹ️ Paid every 3 years. Monthly equivalent: <strong style="color:#06b6d4">'+ff(Math.round(D.health.premium/36))+'/mo</strong>. Next due: <strong style="color:#fbbf24">Feb 2029</strong></div>';
  html("tab-hlth",'<div class="card"><div class="ctitle" style="color:#06b6d4">❤️ HEALTH INSURANCE — HDFC ERGO</div>'+h+'</div>');
}

// ── CHILDREN ──
function renderKids(){
  var h="";
  if(!D.children.expenses||D.children.expenses.length===0){
    h='<div style="color:#475569;font-size:12px;text-align:center;padding:20px 0">No children expenses yet. Add below.</div>';
  } else {
    for(var i=0;i<D.children.expenses.length;i++){
      var ex=D.children.expenses[i];
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;padding:7px 10px;background:#1e293b;border-radius:6px'+(editMode?';border:1px solid rgba(245,158,11,0.2)':'')+'">';
      if(editMode){
        h+='<input style="background:transparent;border:none;border-bottom:1px solid #334155;color:#94a3b8;font-size:12px;outline:none;font-family:inherit;flex:1;margin-right:10px" value="'+ex.label+'" onblur="D.children.expenses['+i+'].label=this.value;autoSave();renderAll();"/>';
        h+='<input style="background:transparent;border:none;border-bottom:1px solid #f59e0b;color:#f59e0b;font-size:12px;font-weight:700;outline:none;width:80px;text-align:right;font-family:inherit" value="'+ex.v+'" onblur="D.children.expenses['+i+'].v=num(this.value);autoSave();renderAll();"/>';
        h+='<button onclick="D.children.expenses.splice('+i+',1);autoSave();renderAll();" style="background:transparent;border:none;color:#ef4444;cursor:pointer;font-size:13px;margin-left:6px">🗑</button>';
      } else {
        h+='<span style="color:#64748b;font-size:12px">'+ex.icon+' '+ex.label+'</span>';
        h+='<span style="color:#22d3a5;font-size:12px;font-weight:700">'+ff(ex.v)+'/mo</span>';
      }
      h+='</div>';
    }
    var childTotal=0;for(var j=0;j<D.children.expenses.length;j++)childTotal+=D.children.expenses[j].v;
    h+='<div style="display:flex;justify-content:space-between;padding:9px 10px;background:rgba(34,211,165,0.08);border-radius:6px;margin-top:6px"><strong style="font-size:12px">Total Children Expenses</strong><strong style="color:#22d3a5">'+ff(childTotal)+'/mo</strong></div>';
  }
  html("tab-kids",'<div class="card"><div class="ctitle" style="color:#22d3a5">👶 CHILDREN\'S EXPENSES</div>'+h
    +'<button class="addbtn" onclick="addKid()">+ Add Children\'s Expense</button></div>');
}
function addKid(){
  var label=prompt("Expense name (e.g. School Fees, Sports, Tuition):","");
  if(!label)return;
  var val=prompt("Monthly amount (₹):","0");
  D.children.expenses.push({id:"k"+Date.now(),label:label,v:num(val)||0,icon:"📚"});
  autoSave();renderAll();
}

// ── REMINDERS ──
function renderRem(){
  var sipV=0;for(var i=0;i<D.expenses.monthly.length;i++){if(D.expenses.monthly[i].id==="sip")sipV=D.expenses.monthly[i].v;}
  var items=[
    {l:"SBI Loan EMI",          d:"15th every month",             a:ff(D.loans.sbi.emi),   c:"#3b82f6"},
    {l:"ICICI Loan EMI",        d:"10th every month",             a:ff(D.loans.icici.emi), c:"#8b5cf6"},
    {l:"SIP Investment",        d:"4th every month (auto-debit)", a:ff(sipV),              c:"#6366f1"},
    {l:"3Cr Term Insurance",    d:"15-May each year",             a:ff(252057)+"/yr",      c:"#f59e0b"},
    {l:"2Cr Term Insurance",    d:"17-Feb each year",             a:ff(180110)+"/yr",      c:"#a78bfa"},
    {l:"Health Insurance",      d:"Feb 2029 (every 3 years)",     a:ff(D.health.premium)+"/3yr", c:"#06b6d4"}
  ];
  var h="";
  for(var j=0;j<items.length;j++){
    var it=items[j];
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#1e293b;border-radius:8px;margin-bottom:8px;border-left:3px solid '+it.c+'">'
      +'<div><div style="font-size:13px;font-weight:600">'+it.l+'</div><div style="font-size:11px;color:#475569;margin-top:2px">'+it.d+'</div></div>'
      +'<div style="color:'+it.c+';font-size:13px;font-weight:800">'+it.a+'</div></div>';
  }
  html("tab-rem",'<div class="card"><div class="ctitle" style="color:#fbbf24">🔔 PAYMENT REMINDERS</div>'+h+'</div>');
}

// ── AUTO LOGIN ON PAGE LOAD ──
window.onload = function(){
  var token = localStorage.getItem("mf_token");
  var uid   = localStorage.getItem("mf_uid");
  var name  = localStorage.getItem("mf_name");
  var email = localStorage.getItem("mf_email");
  var savedData = localStorage.getItem("mf_data");

  if(token && uid){
    sbToken = token;
    sbUid   = uid;
    get("uname").textContent  = name  || "Dashboard";
    get("uemail").textContent = email || "";

    // Load local data immediately so UI shows fast
    if(savedData){try{D=JSON.parse(savedData);}catch(e){}}

    // Then try to refresh from cloud
    sbLoad(sbToken).then(function(rows){
      if(rows && rows[0] && rows[0].data){
        try{D=JSON.parse(rows[0].data);}catch(e){}
      }
      showApp();
    }).catch(function(){
      // Cloud failed but we have local data — still show app
      showApp();
    });
  }
};
</script>
